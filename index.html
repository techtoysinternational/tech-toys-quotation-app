<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech Toys CRM Pro — Migration Ready</title>
<style>
:root{--bg:#0b0f17;--panel:#151b27;--panel2:#1d2533;--text:#eef2f7;--muted:#98a2b3;--line:#2c3446;--accent:#ff7a2f;--accent2:#ffb071;--green:#2dd4bf;--red:#ef4444;--blue:#60a5fa;--amber:#fbbf24}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}.side{background:#0f1420;border-right:1px solid var(--line);padding:18px}.brand{font-size:21px;font-weight:900;letter-spacing:.5px;color:#fff}.sub{font-size:12px;color:var(--muted);margin:4px 0 20px}.nav button{display:block;width:100%;text-align:left;background:transparent;color:var(--muted);border:0;border-radius:10px;padding:12px;margin:4px 0}.nav button.active,.nav button:hover{background:var(--panel2);color:#fff}.sync{margin-top:20px;font-size:12px;color:var(--green)}
.main{padding:26px;overflow:auto}.head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.title{font-size:24px;font-weight:800}.small{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px;margin-bottom:20px}.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}.k{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}.v{font-size:26px;font-weight:800;margin-top:7px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{background:var(--panel2);color:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px}.btn.primary{background:var(--accent);border-color:var(--accent);color:#111;font-weight:800}.btn.danger{background:#3b1519;border-color:#5c242b;color:#ffb4b4}.btn.good{background:#11352f;border-color:#1b5b50;color:#92fff0}.btn.sm{padding:6px 9px;font-size:12px}
input,select,textarea{width:100%;background:#0f1420;color:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:700}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:14px;overflow:hidden;border:1px solid var(--line)}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:top}th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px}tr:last-child td{border-bottom:0}.right{text-align:right}.pill{font-size:11px;padding:4px 8px;border-radius:999px;background:#263044;color:#b9c3d6;text-transform:uppercase;font-weight:800}.pill.paid{background:#103a2f;color:#5ff0d4}.pill.sent{background:#102b4b;color:#8fc5ff}.pill.converted{background:#3a2d10;color:#ffd36a}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.show{display:flex}.box{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:min(900px,95vw);max-height:90vh;overflow:auto}.boxh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}.boxb{padding:20px}.boxf{padding:16px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}.items td{padding:6px}.items input{padding:8px}
#printArea{display:none}
@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:5}.grid{grid-template-columns:repeat(2,1fr)}.form{grid-template-columns:1fr}}
@media print{@page{size:A4;margin:0}body{margin:0!important;background:#fff!important;color:#000!important}.app,.modal{display:none!important}#printArea{display:block!important}}
.printPage{width:210mm;min-height:297mm;background:white;color:#111;padding:14mm 14mm 12mm;font-family:Arial,sans-serif;position:relative}.pTop{display:flex;justify-content:space-between;border-bottom:4px solid #111;padding-bottom:12px}.pBrand{font-size:30px;font-weight:900}.pTag{color:#666;font-size:12px;margin-top:4px}.pMeta{text-align:right}.pMeta h1{margin:0;color:#ff7a2f;font-size:24px}.pSec{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;margin:18px 0}.pLabel{font-size:11px;color:#777;font-weight:800;letter-spacing:.8px;text-transform:uppercase}.pName{font-size:18px;font-weight:800;margin:4px 0}.pTable{width:100%;border-collapse:collapse;border:0;background:white}.pTable th{background:#111;color:white;border:0;padding:8px;font-size:10px}.pTable td{border-bottom:1px solid #ddd;padding:8px;color:#111;font-size:11px}.pTotals{width:290px;margin-left:auto;margin-top:12px}.pTotals td{border:0;padding:5px;font-size:12px}.pTotals .gt td{border-top:2px solid #111;color:#ff7a2f;font-size:16px;font-weight:900}.pFoot{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:26px;border-top:1px solid #ddd;padding-top:14px;font-size:11px}.sign{margin-top:35px;text-align:right}.sign b{display:inline-block;border-top:1px solid #777;padding-top:6px;min-width:150px;text-align:center}
</style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand">TECH TOYS</div><div class="sub">CRM + Quotation Pro</div><div class="nav"><button id="nav-dashboard" onclick="show('dashboard')">Dashboard</button><button id="nav-leads" onclick="show('leads')">Leads</button><button id="nav-clients" onclick="show('clients')">Clients</button><button id="nav-quotes" onclick="show('quotes')">Quotations</button><button id="nav-settings" onclick="show('settings')">Settings</button></div><div class="sync" id="sync">Connecting Firebase...</div><div class="small" style="margin-top:10px">Default GST: CGST 9% + SGST 9%<br>IGST optional per quotation.</div></aside><main class="main" id="view"></main></div>

<script type="module">

const firebaseConfig={apiKey:"AIzaSyAEbNB_tCs4BV4EyBHAscJe7w9TG7PTuMM",authDomain:"tech-toys-quotation.firebaseapp.com",projectId:"tech-toys-quotation",storageBucket:"tech-toys-quotation.firebasestorage.app",messagingSenderId:"609352082860",appId:"1:609352082860:web:ec339fbea8bebcb110c609"};
const app=initializeApp(firebaseConfig),db=getFirestore(app),$=id=>document.getElementById(id),money=n=>"₹"+(Number(n||0)).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
let state={leads:[],clients:[],quotes:[],products:[],settings:null},current="dashboard";
const defaultSettings={company:"TECH TOYS",tagline:"Sound | Light | LED Screens",address:"32/4 Sahitya Parishad Street, 307 Block D, Kolkata 700 006",gstin:"19BZWPS8456G1Z8",pan:"BZWPS8456G",email:"info@techtoysinternational.com",phone:"9830006761",bank:"AXIS BANK · LENIN SARANI",acName:"TECH TOYS",acNo:"918020064573131",ifsc:"UTIB0002261",micr:"700211097",terms:"This quotation is valid for 30 days from date of issue.\n100% advance, balance on delivery.\nPrices are inclusive of installation unless stated otherwise."};
setDoc(doc(db,"settings","main"),defaultSettings,{merge:true}).catch(console.error);
function listen(name){onSnapshot(collection(db,name),snap=>{state[name]=snap.docs.map(d=>({id:d.id,...d.data()}));$("sync").textContent="● Live Sync Connected";render();},err=>{$("sync").textContent="Firebase error: "+err.message;console.error(err);});}
["leads","clients","quotes","products"].forEach(listen);onSnapshot(doc(db,"settings","main"),snap=>{state.settings=snap.exists()?snap.data():defaultSettings;render();});
window.show=p=>{current=p;render()};function active(){document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));const b=$("nav-"+current);if(b)b.classList.add("active")}function render(){active();if(!$('view'))return;({dashboard,leads,clients,quotes,settings}[current]||dashboard)()}
function dashboard(){const quoted=state.quotes.reduce((s,q)=>s+Number(q.grandTotal||0),0);$("view").innerHTML=`<div class="head"><div><div class="title">Dashboard</div><div class="small">Live overview of Tech Toys sales pipeline</div></div><button class="btn primary" onclick="openQuote()">+ New Quote</button></div><div class="grid"><div class="card"><div class="k">Leads</div><div class="v">${state.leads.length}</div></div><div class="card"><div class="k">Clients</div><div class="v">${state.clients.length}</div></div><div class="card"><div class="k">Quotations</div><div class="v">${state.quotes.length}</div></div><div class="card"><div class="k">Quoted Value</div><div class="v">${money(quoted)}</div></div></div><div class="card"><div class="head"><div><b>Recent Quotations</b><div class="small">Latest 8 records</div></div></div>${quoteTable(state.quotes.slice(-8).reverse())}</div>`}

function clients(){$("view").innerHTML=`<div class="head"><div><div class="title">Clients</div><div class="small">Customer database</div></div><button class="btn primary" onclick="openClient()">+ Add Client</button></div>${clientTable(state.clients)}`}
function quotes(){$("view").innerHTML=`<div class="head"><div><div class="title">Quotations</div><div class="small">Default GST is CGST 9% + SGST 9%; IGST is optional.</div></div><button class="btn primary" onclick="openQuote()">+ New Quote</button></div>${quoteTable(state.quotes.slice().reverse())}`}
function settings(){const s=state.settings||defaultSettings;$("view").innerHTML=`<div class="head"><div><div class="title">Settings</div><div class="small">Company details used on quotations</div></div></div><div class="card"><div class="form">${inp("company","Company",s.company)}${inp("tagline","Tagline",s.tagline)}${inp("address","Address",s.address,"full")}${inp("gstin","GSTIN",s.gstin)}${inp("pan","PAN",s.pan)}${inp("email","Email",s.email)}${inp("phone","Phone",s.phone)}${inp("bank","Bank",s.bank,"full")}${inp("acName","A/C Name",s.acName)}${inp("acNo","A/C No.",s.acNo)}${inp("ifsc","IFSC",s.ifsc)}${inp("micr","MICR",s.micr)}<div class="full"><label>Terms</label><textarea id="set_terms" rows="5">${esc(s.terms||"")}</textarea></div></div><div style="margin-top:15px"><button class="btn primary" onclick="saveSettings()">Save Settings</button></div></div><div class="card"><div class="head"><div><b>Old Data Migration</b><div class="small">Imports your old Tech Toys data from <code>techtoys/appState</code> into the new Leads / Clients / Quotations structure. Safe to click once; it uses old IDs so it will not duplicate if clicked again.</div></div></div><button class="btn good" onclick="importOldData()">Import Old Data</button><div class="small" id="migrationStatus" style="margin-top:10px">Use this only after replacing the file on GitHub.</div></div>`}
function inp(id,label,val,cls=""){return`<div class="${cls}"><label>${label}</label><input id="set_${id}" value="${esc(val||"")}"></div>`}
function leadTable(rows){if(!rows.length)return`<div class="card small">No leads yet.</div>`;return`<table><thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Status</th><th>Action</th></tr></thead><tbody>${rows.map(l=>`<tr><td><b>${esc(l.name)}</b><br><span class="small">${esc(l.email||"")}</span></td><td>${esc(l.phone||"")}</td><td>${esc(l.source||"")}</td><td><span class="pill ${l.status==="Converted"?"converted":""}">${esc(l.status||"New")}</span></td><td class="row"><button class="btn sm good" onclick="convertLead('${l.id}')">Convert</button><button class="btn sm danger" onclick="del('leads','${l.id}')">Delete</button></td></tr>`).join("")}</tbody></table>`}
function clientTable(rows){if(!rows.length)return`<div class="card small">No clients yet.</div>`;return`<table><thead><tr><th>Client</th><th>Phone</th><th>GSTIN</th><th>Address</th><th>Action</th></tr></thead><tbody>${rows.map(c=>`<tr><td><b>${esc(c.name)}</b><br><span class="small">${esc(c.email||"")}</span></td><td>${esc(c.phone||"")}</td><td>${esc(c.gstin||"")}</td><td>${esc(c.address||"")}</td><td><button class="btn sm primary" onclick="openQuote('${c.id}')">Quote</button></td></tr>`).join("")}</tbody></table>`}
function quoteTable(rows){if(!rows.length)return`<div class="small">No quotations yet.</div>`;return`<table><thead><tr><th>No.</th><th>Client</th><th>Date</th><th>Status</th><th>GST Type</th><th class="right">Total</th><th>Action</th></tr></thead><tbody>${rows.map(q=>`<tr><td><b>${esc(q.no)}</b></td><td>${esc(clientName(q.clientId)||q.clientName||"")}</td><td>${esc(q.date||"")}</td><td><span class="pill ${q.status==="Paid"?"paid":q.status==="Sent"?"sent":""}">${esc(q.status||"Draft")}</span></td><td>${q.gstType==="IGST"?"IGST 18%":q.gstType==="NONE"?"No GST":"CGST 9% + SGST 9%"}</td><td class="right"><b>${money(q.grandTotal)}</b></td><td class="row"><button class="btn sm" onclick="printQuote('${q.id}')">Print/PDF</button><button class="btn sm danger" onclick="del('quotes','${q.id}')">Delete</button></td></tr>`).join("")}</tbody></table>`}
function clientName(id){return(state.clients.find(c=>c.id===id)||{}).name}
window.openLead=()=>modal("Add Lead",`<div class="form">${field("lead_name","Name")}${field("lead_phone","Phone")}${field("lead_email","Email")}${field("lead_source","Source")}<div class="full">${area("lead_notes","Notes")}</div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveLead()">Save Lead</button>`);
window.saveLead=async()=>{await addDoc(collection(db,"leads"),{name:v("lead_name"),phone:v("lead_phone"),email:v("lead_email"),source:v("lead_source"),notes:v("lead_notes"),status:"New",createdAt:serverTimestamp()});closeModal()};
window.convertLead=async id=>{const l=state.leads.find(x=>x.id===id);if(!l)return;await addDoc(collection(db,"clients"),{name:l.name,phone:l.phone||"",email:l.email||"",address:"",gstin:"",fromLead:id,createdAt:serverTimestamp()});await updateDoc(doc(db,"leads",id),{status:"Converted",convertedAt:serverTimestamp()})};
window.openClient=()=>modal("Add Client",`<div class="form">${field("c_name","Client Name")}${field("c_phone","Phone")}${field("c_email","Email")}${field("c_gstin","GSTIN")}<div class="full">${area("c_address","Address")}</div></div>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveClient()">Save Client</button>`);
window.saveClient=async()=>{await addDoc(collection(db,"clients"),{name:v("c_name"),phone:v("c_phone"),email:v("c_email"),gstin:v("c_gstin"),address:v("c_address"),createdAt:serverTimestamp()});closeModal()};
window.openQuote=(clientId="")=>{const no="PI-"+new Date().getFullYear().toString().slice(2)+"-"+String(state.quotes.length+1).padStart(3,"0");modal("New Quotation",`<div class="form"><div><label>Quote No.</label><input id="q_no" value="${no}"></div><div><label>Date</label><input id="q_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div><div class="full"><label>Client</label><select id="q_client">${state.clients.map(c=>`<option value="${c.id}" ${c.id===clientId?"selected":""}>${esc(c.name)}</option>`).join("")}</select></div><div><label>Status</label><select id="q_status"><option>Draft</option><option>Sent</option><option>Paid</option><option>Lost</option></select></div><div><label>GST Type</label><select id="q_gst"><option value="CGST_SGST" selected>CGST 9% + SGST 9% (Default)</option><option value="IGST">IGST 18%</option><option value="NONE">No GST</option></select></div><div class="full"><label>Project</label><input id="q_project" value="Cabling & General"></div></div><hr><b>Items</b><table class="items"><thead><tr><th>Item</th><th>Desc</th><th>Qty</th><th>Unit</th><th>Rate</th><th></th></tr></thead><tbody id="itemRows"></tbody></table><button class="btn sm" onclick="addItemRow()">+ Add Item</button>`,`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveQuote()">Save Quote</button>`);addItemRow()};
window.addItemRow=()=>{const tr=document.createElement("tr");tr.innerHTML=`<td><input class="it_name"></td><td><input class="it_desc"></td><td><input class="it_qty" type="number" value="1"></td><td><input class="it_uom" value="Nos."></td><td><input class="it_rate" type="number" value="0"></td><td><button class="btn sm danger" onclick="this.closest('tr').remove()">×</button></td>`;$("itemRows").appendChild(tr)};
window.saveQuote=async()=>{const items=[...document.querySelectorAll("#itemRows tr")].map(tr=>({name:tr.querySelector(".it_name").value,desc:tr.querySelector(".it_desc").value,qty:Number(tr.querySelector(".it_qty").value||0),uom:tr.querySelector(".it_uom").value,rate:Number(tr.querySelector(".it_rate").value||0)})).filter(i=>i.name||i.desc);const sub=items.reduce((s,i)=>s+i.qty*i.rate,0),gstType=v("q_gst"),cgst=gstType==="CGST_SGST"?sub*.09:0,sgst=gstType==="CGST_SGST"?sub*.09:0,igst=gstType==="IGST"?sub*.18:0;await addDoc(collection(db,"quotes"),{no:v("q_no"),date:v("q_date"),clientId:v("q_client"),clientName:clientName(v("q_client")),project:v("q_project"),status:v("q_status"),gstType,items,subtotal:sub,cgst,sgst,igst,grandTotal:sub+cgst+sgst+igst,createdAt:serverTimestamp()});closeModal()};
window.printQuote=id=>{const q=state.quotes.find(x=>x.id===id),c=state.clients.find(x=>x.id===q.clientId)||{},s=state.settings||defaultSettings;const rows=q.items.map((it,i)=>`<tr><td>${i+1}</td><td><b>${esc(it.name)}</b><br><span style="color:#666">${esc(it.desc||"")}</span></td><td>${esc(it.uom||"")}</td><td style="text-align:right">${it.qty}</td><td style="text-align:right">${money(it.rate)}</td><td style="text-align:right">${money(it.qty*it.rate)}</td></tr>`).join("");const taxes=q.gstType==="CGST_SGST"?`<tr><td>CGST @ 9%</td><td class="right">${money(q.cgst)}</td></tr><tr><td>SGST @ 9%</td><td class="right">${money(q.sgst)}</td></tr>`:q.gstType==="IGST"?`<tr><td>IGST @ 18%</td><td class="right">${money(q.igst)}</td></tr>`:"";$("printArea").innerHTML=`<div class="printPage"><div class="pTop"><div><div class="pBrand">${esc(s.company)}</div><div class="pTag">${esc(s.tagline)}</div><div style="font-size:11px;margin-top:8px">${esc(s.address)}<br>GSTIN: ${esc(s.gstin)} · PAN: ${esc(s.pan)}<br>${esc(s.email)} · ${esc(s.phone)}</div></div><div class="pMeta"><h1>QUOTATION</h1><div><b>${esc(q.no)}</b></div><div>Date: ${esc(q.date)}</div><div>Status: ${esc(q.status)}</div></div></div><div class="pSec"><div><div class="pLabel">Quotation For</div><div class="pName">${esc(c.name||q.clientName||"")}</div><div>${esc(c.address||"")}<br>${esc(c.phone||"")} ${c.email?"· "+esc(c.email):""}<br>${c.gstin?"GSTIN: "+esc(c.gstin):""}</div></div><div><div class="pLabel">Project</div><div class="pName">${esc(q.project||"")}</div><div>${q.gstType==="IGST"?"IGST @ 18%":q.gstType==="NONE"?"No GST":"CGST @ 9% + SGST @ 9%"}</div></div></div><table class="pTable"><thead><tr><th>#</th><th>Item</th><th>UOM</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table><table class="pTotals"><tr><td>Subtotal</td><td class="right">${money(q.subtotal)}</td></tr>${taxes}<tr class="gt"><td>Grand Total</td><td class="right">${money(q.grandTotal)}</td></tr></table><div class="pFoot"><div><b>Bank Details</b><br>${esc(s.bank)}<br>A/C Name: ${esc(s.acName)}<br>A/C No: ${esc(s.acNo)}<br>IFSC: ${esc(s.ifsc)} · MICR: ${esc(s.micr)}</div><div><b>Terms</b><br>${esc(s.terms).replaceAll("\n","<br>")}</div></div><div class="sign">For ${esc(s.company)}<br><br><b>Kunal Singh</b></div></div>`;setTimeout(()=>window.print(),100)};
window.saveSettings=async()=>{const data={};["company","tagline","address","gstin","pan","email","phone","bank","acName","acNo","ifsc","micr","terms"].forEach(k=>data[k]=v("set_"+k));await setDoc(doc(db,"settings","main"),data,{merge:true})};

async function importOldData(){
  const statusEl=document.getElementById("migrationStatus");
  const log=t=>{if(statusEl)statusEl.textContent=t; $("sync").textContent=t;};
  try{
    if(!confirm("Import old saved data from techtoys/appState into the new CRM structure? This is safe and will not duplicate records with the same old IDs.")) return;
    log("Reading old data from Firebase...");
    const snap=await getDoc(doc(db,"techtoys","appState"));
    if(!snap.exists()){log("No old data found at techtoys/appState.");alert("No old data found at techtoys/appState.");return;}
    const raw=snap.data()||{};
    const legacy=raw.db || raw.appState || raw;
    const arr=x=>Array.isArray(x)?x:(x&&typeof x==="object"?Object.values(x):[]);
    const safeId=(v,p)=>String(v||p||("id"+Date.now()+Math.random())).replace(/[\/#[\]?]/g,"_");
    const clientMap=new Map();
    const oldClients=arr(legacy.clients);
    const oldQuotes=[...arr(legacy.quotes), ...arr(legacy.quotations), ...arr(legacy.projects).filter(p=>p&&typeof p==="object"&&(p.items||p.pi_no||p.client||p.project_name))];
    const oldLeads=arr(legacy.leads);
    const oldProducts=arr(legacy.products);
    let clientCount=0, quoteCount=0, leadCount=0, productCount=0;
    for(const c of oldClients){
      const id=safeId(c.id,"C"+String(++clientCount).padStart(4,"0"));
      clientMap.set(String((c.name||"").toLowerCase()), id);
      await setDoc(doc(db,"clients",id),{
        name:c.name||c.client||c.company||"Unnamed Client",
        phone:c.phone||"", email:c.email||"", gstin:c.gstin||"", pan:c.pan||"",
        address:[c.address_l1,c.address_l2,c.city,c.state,c.pincode].filter(Boolean).join(", ") || c.address || "",
        contact_person:c.contact_person||"", notes:c.notes||"", projects:c.projects||[], legacyId:c.id||id, migratedAt:new Date().toISOString()
      },{merge:true});
    }
    for(const l of oldLeads){
      const id=safeId(l.id,"L"+String(++leadCount).padStart(4,"0"));
      await setDoc(doc(db,"leads",id),{
        name:l.name||l.client||l.company||l.project||"Unnamed Lead",
        phone:l.phone||"", email:l.email||"", source:l.source||"", notes:l.notes||"", status:l.status||"New",
        value:Number(l.value||l.est_value||0), nextFollowUp:l.next_followup||l.nextFollowUp||"", legacyId:l.id||id, migratedAt:new Date().toISOString()
      },{merge:true});
    }
    const ensureClient=async(name)=>{
      const key=String(name||"").toLowerCase();
      if(clientMap.has(key))return clientMap.get(key);
      const id="C_AUTO_"+safeId(name||"Client");
      clientMap.set(key,id);
      await setDoc(doc(db,"clients",id),{name:name||"Unnamed Client",phone:"",email:"",address:"",gstin:"",legacyId:id,migratedAt:new Date().toISOString()},{merge:true});
      return id;
    };
    for(const q of oldQuotes){
      const id=safeId(q.id||q.pi_no,"Q"+String(++quoteCount).padStart(4,"0"));
      const clientId=q.client_id||await ensureClient(q.client||q.clientName||q.name||"");
      const items=arr(q.items).map(it=>({
        name:it.make||it.name||it.item||"", desc:it.desc||it.description||"", code:it.code||"", country:it.country||"",
        qty:Number(it.qty||0), uom:it.uom||"Nos.", rate:Number(it.price||it.rate||it.unit_price||0)
      }));
      const subtotal=items.reduce((sum,it)=>sum+(Number(it.qty)||0)*(Number(it.rate)||0),0);
      const discount=Number(q.discount||0);
      const taxable=Math.max(0,subtotal-discount);
      let gstType="CGST_SGST";
      if(String(q.tax_type||q.gstType||"").toUpperCase().includes("IGST")) gstType="IGST";
      if(String(q.tax_type||q.gstType||"").toUpperCase().includes("NONE")||Number(q.tax_pct)===0) gstType="NONE";
      const cgst=gstType==="CGST_SGST"?taxable*0.09:0, sgst=gstType==="CGST_SGST"?taxable*0.09:0, igst=gstType==="IGST"?taxable*0.18:0;
      await setDoc(doc(db,"quotes",id),{
        no:q.pi_no||q.no||q.quote_no||id, date:q.date||new Date().toISOString().slice(0,10), clientId, clientName:q.client||q.clientName||"",
        project:q.project_name||q.project||"", status:q.status||"Draft", gstType, items, subtotal, discount, cgst, sgst, igst,
        grandTotal:Number(q.grandTotal||q.grand_total||q.total||q.amount||taxable+cgst+sgst+igst), amountPaid:Number(q.amount_paid||q.amountPaid||0), notes:q.notes||"", legacyId:q.id||id, migratedAt:new Date().toISOString()
      },{merge:true});
    }
    for(const p of oldProducts){
      const id=safeId(p.id||p.code||p.make,"P"+String(++productCount).padStart(4,"0"));
      await setDoc(doc(db,"products",id),{...p,legacyId:p.id||id,migratedAt:new Date().toISOString()},{merge:true});
    }
    if(legacy.company){
      const c=legacy.company;
      await setDoc(doc(db,"settings","main"),{
        company:c.name||"TECH TOYS", tagline:c.tagline||"Sound | Light | LED Screens", address:[c.address_l1,c.address_l2].filter(Boolean).join(", ")||c.address||"",
        gstin:c.gstin||"", pan:c.pan||"", email:c.email||"", phone:c.phone||"", bank:[c.bank_name,c.bank_branch].filter(Boolean).join(" · "), acName:c.bank_ac_name||"", acNo:c.bank_ac||"", ifsc:c.bank_ifsc||"", micr:c.bank_micr||"", terms:c.default_terms||defaultSettings.terms
      },{merge:true});
    }
    log(`Migration complete: ${oldClients.length} clients, ${oldLeads.length} leads, ${oldQuotes.length} quotations, ${oldProducts.length} products imported.`);
    alert("Migration complete. Open Dashboard / Clients / Quotations now.");
  }catch(err){console.error(err);log("Migration failed: "+err.message);alert("Migration failed: "+err.message);}
}
window.importOldData=importOldData;

window.del=async(col,id)=>{if(confirm("Delete this record?"))await deleteDoc(doc(db,col,id))};function modal(title,body,foot){$("modalBox").innerHTML=`<div class="boxh"><b>${title}</b><button class="btn sm" onclick="closeModal()">×</button></div><div class="boxb">${body}</div><div class="boxf">${foot}</div>`;$("modal").classList.add("show")}window.closeModal=()=>$("modal").classList.remove("show");function field(id,label){return`<div><label>${label}</label><input id="${id}"></div>`}function area(id,label){return`<label>${label}</label><textarea id="${id}" rows="3"></textarea>`}function v(id){return($(id)||{}).value||""}function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}render();
</script>
</body>
