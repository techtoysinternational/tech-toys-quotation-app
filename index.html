function saveLead(id){
  ensureLeads();
  const data = {
    client_name: document.getElementById('el_cn').value.trim(),
    project_name: document.getElementById('el_pn').value.trim(),
    contact_person: document.getElementById('el_cp').value.trim(),
    contact_phone: document.getElementById('el_ph').value.trim(),
    contact_email: document.getElementById('el_em').value.trim(),
    source: document.getElementById('el_src').value,
    estimated_value: +document.getElementById('el_ev').value || 0,
    next_followup: document.getElementById('el_nf').value || '',
    notes: document.getElementById('el_nt').value.trim(),
    status: document.getElementById('el_st').value,
  };
  if(!data.client_name){ alert('Client / Company Name is required'); return; }
  const now = new Date().toISOString();
  if(id){
    const l = DB.leads.find(x=>x.id===id);
    Object.assign(l, data, {updated: now});
  } else {
    DB.leads.push({id: nextLeadId(), ...data, created: now, updated: now});
  }
  saveDB();
  closeModal();
  toast(id ? 'Lead updated' : 'Lead created');
  if(CURRENT_VIEW==='leads') renderLeads();
  else if(CURRENT_VIEW==='dashboard') renderDashboard();
}

function deleteLead(id){
  ensureLeads();
  const l = DB.leads.find(x=>x.id===id);
  if(!l) return;
  if(!confirm(`Delete lead "${l.client_name}"? This cannot be undone.`)) return;
  DB.leads = DB.leads.filter(x=>x.id!==id);
  saveDB();
  closeModal();
  toast('Lead deleted');
  if(CURRENT_VIEW==='leads') renderLeads();
  else if(CURRENT_VIEW==='dashboard') renderDashboard();
}

function convertLeadToQuote(id){
  ensureLeads();
  const lead = DB.leads.find(x=>x.id===id);
  if(!lead) return;
  if(lead.status !== 'Open'){
    if(!confirm(`This lead is already marked "${lead.status}". Convert to a new quote anyway?`)) return;
  }
  // Try to find or create a matching client
  let client = (DB.clients||[]).find(c => c.name.toLowerCase() === (lead.client_name||'').toLowerCase());
  if(!client){
    let n = 1; while((DB.clients||[]).find(c=>c.id===`C${String(n).padStart(4,'0')}`)) n++;
    client = {
      id: `C${String(n).padStart(4,'0')}`,
      name: lead.client_name,
      contact_person: lead.contact_person||'', phone: lead.contact_phone||'', email: lead.contact_email||'',
      address_l1:'', address_l2:'', city:'', state:'', pincode:'', gstin:'', pan:'',
      projects: lead.project_name ? [lead.project_name] : [],
      notes: lead.notes||'',
      created: new Date().toISOString(),
    };
    if(!DB.clients) DB.clients = [];
    DB.clients.push(client);
  } else if(lead.project_name && !(client.projects||[]).some(p=>p.toLowerCase()===lead.project_name.toLowerCase())){
    if(!client.projects) client.projects = [];
    client.projects.push(lead.project_name);
  }
  // Create a new Draft quote pre-filled from the lead
  const newQuote = {
    id: nextQuoteId(),
    pi_no: nextPiNo(),
    client: client.name,
    client_id: client.id,
    project_name: lead.project_name || '',
    date: today(),
    items: [],
    tax_type: 'IGST',
    tax_pct: 18,
    discount: 0,
    status: 'Draft',
    payments: [],
    expenses: [],
    amount_paid: 0,
    notes: lead.notes ? `Converted from lead ${lead.id}\n${lead.notes}` : `Converted from lead ${lead.id}`,
    terms: '',
    created: new Date().toISOString(),
    updated: new Date().toISOString(),
  };
  DB.quotes.push(newQuote);
  // Mark lead as converted
  lead.status = 'Converted';
  lead.converted_quote_id = newQuote.id;
  lead.updated = new Date().toISOString();
  saveDB();
  closeModal();
  toast(`Lead converted to ${newQuote.pi_no} (Draft)`);
  navigate('edit-quote', newQuote.id);
}

   BOOT
   ============================================================ */
document.getElementById('loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const ok = await login(document.getElementById('loginPwd').value);
  if(ok){
    document.getElementById('loginErr').style.display='none';
    showApp();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginPwd').value='';
  }
});

function showApp(){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('app').classList.add('show');
  loadDB();
  document.getElementById('navUser').textContent = DB.company.contact_person || DB.company.name;
  renderFYSelector();
  const [view, param] = parseHash();
  navigate(view, param);
  initCloudSync();
}

window.addEventListener('hashchange', ()=>{
  if(!isLoggedIn()) return;
  const [view, param] = parseHash();
  if(view !== CURRENT_VIEW.split('/')[0]) navigate(view, param);
});

if(isLoggedIn()) showApp();
</script>

<script>
/* Tech Toys Auto Update Fix
   Clears old PWA caches and forces the newest GitHub Pages version to load. */
(function(){
  const BUILD_VERSION = '2026-05-04-firebase-final-v2';
  const BUILD_KEY = 'techToys_build_version';

  async function clearOldCaches(){
    if (!('caches' in window)) return;
    const keys = await caches.keys();
    await Promise.all(keys
      .filter(k => k.startsWith('techtoys-quotation') && k !== 'techtoys-quotation-auto-v3')
      .map(k => caches.delete(k))
    );
  }

  async function registerAutoUpdateSW(){
    if (!('serviceWorker' in navigator)) return;
    const reg = await navigator.serviceWorker.register('./service-worker.js?v=' + encodeURIComponent(BUILD_VERSION), {
      scope: './',
      updateViaCache: 'none'
    });
    await reg.update();
    if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
    reg.addEventListener('updatefound', () => {
      const worker = reg.installing;
      if (!worker) return;
      worker.addEventListener('statechange', () => {
        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
          worker.postMessage({type:'SKIP_WAITING'});
          setTimeout(() => location.reload(), 500);
        }
      });
    });
  }

  window.addEventListener('load', async () => {
    try{
      await clearOldCaches();
      await registerAutoUpdateSW();
      const old = localStorage.getItem(BUILD_KEY);
      if (old !== BUILD_VERSION) {
        localStorage.setItem(BUILD_KEY, BUILD_VERSION);
        // Reload once after update so old service-worker-controlled pages are replaced.
        if (old) location.reload();
      }
    }catch(e){ console.warn('Auto update check failed', e); }
  });
})();
</script>
