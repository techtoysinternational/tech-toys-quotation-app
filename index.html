<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Toys — Quotation System</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e14; --bg2:#11151d; --panel:#171c26; --panel2:#1f2532;
  --border:#2a3142; --border2:#3a4256;
  --text:#e6e8ee; --muted:#8b95a8; --muted2:#5b6478;
  --accent:#ff7a2f; --accent2:#ffa066; --accent-dim:#3a2615;
  --green:#2dd4bf; --green-dim:#0f2e2a;
  --red:#ef4444; --red-dim:#3a1515;
  --amber:#fbbf24; --amber-dim:#3a2a10;
  --blue:#60a5fa; --blue-dim:#15233a;
  --shadow:0 10px 40px rgba(0,0,0,.5);
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font:inherit;color:inherit;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;outline:none;transition:border .15s,background .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:var(--panel)}
input[type=number]{font-variant-numeric:tabular-nums}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--border);color:var(--text);padding:9px 14px;border-radius:8px;cursor:pointer;font-weight:500;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--panel2);border-color:var(--border2)}
.btn-primary{background:var(--accent);color:#0b0e14;border-color:var(--accent);font-weight:600}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-danger{background:var(--red-dim);border-color:#5a2020;color:#ffb4b4}
.btn-danger:hover{background:#5a2020}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--panel)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px;width:32px;height:32px;justify-content:center}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}

/* Login */
.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 20%,#1a2030 0%,#0b0e14 60%);z-index:1000}
.login-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:var(--shadow)}
.login-logo{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#fff,#ffa066);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px}
.login-tagline{color:var(--muted);font-size:13px;margin-bottom:28px}
.login-card label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.login-err{background:var(--red-dim);color:#ffb4b4;padding:10px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;border:1px solid #5a2020}
.login-hint{color:var(--muted2);font-size:11px;margin-top:14px;text-align:center}

/* Layout */
.app{display:none;height:100vh;grid-template-columns:240px 1fr;overflow:hidden}
.app.show{display:grid}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:18px 0;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:0 22px 18px;border-bottom:1px solid var(--border);margin-bottom:14px}
.brand-name{font-size:18px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,#fff,#ffa066);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 22px;color:var(--muted);cursor:pointer;border-left:3px solid transparent;transition:all .12s;font-weight:500}
.nav-item:hover{background:var(--panel);color:var(--text)}
.nav-item.active{background:var(--panel);color:var(--text);border-left-color:var(--accent)}
.nav-item .ico{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-spacer{flex:1}
.fy-wrap{padding:0 22px 14px;border-bottom:1px solid var(--border);margin-bottom:12px}
.fy-wrap label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:5px}
.fy-wrap select{font-size:13px;padding:7px 10px}
.fy-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--blue-dim);color:var(--blue);border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-left:8px}
.nav-footer{padding:12px 22px;border-top:1px solid var(--border);font-size:11px;color:var(--muted2)}
.nav-footer .user{color:var(--text);font-weight:600;font-size:12px;margin-bottom:2px}

/* Main */
.main{overflow-y:auto;padding:28px 36px}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.3px}
.page-sub{font-size:13px;color:var(--muted);margin-top:2px}
.page-actions{display:flex;gap:8px}

/* KPI cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px}
.kpi-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:4px}
.kpi.green .kpi-value{color:var(--green)}
.kpi.red .kpi-value{color:var(--red)}
.kpi.amber .kpi-value{color:var(--amber)}
.kpi.blue .kpi-value{color:var(--blue)}
.kpi.accent .kpi-value{color:var(--accent2)}

/* Cards / panels */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600}
.card-sub{font-size:12px;color:var(--muted)}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--panel2)}
.tbl-clickable tr{cursor:pointer}
.tbl .num{text-align:right}
.tbl .center{text-align:center}

/* Status pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.pill-sent{background:var(--blue-dim);color:var(--blue)}
.pill-won{background:var(--green-dim);color:var(--green)}
.pill-paid{background:#103a26;color:#34d399}
.pill-lost{background:var(--red-dim);color:#fca5a5}
.pill-draft{background:var(--panel2);color:var(--muted)}
.pill-pending{background:var(--amber-dim);color:var(--amber)}

/* Forms */
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.form-grid .full{grid-column:1/-1}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.field-help{font-size:11px;color:var(--muted2);margin-top:4px}

/* Search bar */
.search-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-row input,.search-row select{max-width:300px}

/* Line items table (new quote) */
.li-tbl{width:100%;border-collapse:separate;border-spacing:0;margin-top:8px}
.li-tbl th{text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border)}
.li-tbl td{padding:4px;vertical-align:top}
.li-tbl input{padding:7px 10px;font-size:13px}
.li-tbl .num input{text-align:right}
.li-row .li-amt{padding:10px 8px;text-align:right;font-variant-numeric:tabular-nums;font-weight:500}

/* Autocomplete */
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--panel);border:1px solid var(--border);border-radius:8px;margin-top:4px;max-height:280px;overflow-y:auto;z-index:50;box-shadow:var(--shadow);display:none}
.ac-list.show{display:block}
.ac-item{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:var(--panel2)}
.ac-item .ac-make{font-weight:600}
.ac-item .ac-desc{color:var(--muted);font-size:12px}
.ac-item .ac-meta{color:var(--accent2);font-size:11px;font-variant-numeric:tabular-nums;margin-left:8px}

/* Totals box */
.totals{display:grid;grid-template-columns:auto auto;gap:8px 24px;justify-content:end;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);font-variant-numeric:tabular-nums}
.totals .lbl{color:var(--muted);text-align:right}
.totals .val{font-weight:500;text-align:right;min-width:120px}
.totals .grand .lbl,.totals .grand .val{font-size:16px;font-weight:700;color:var(--accent2);padding-top:6px;border-top:1px solid var(--border)}

/* Modal */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-wrap.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:520px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--accent);color:var(--text);padding:12px 18px;border-radius:8px;box-shadow:var(--shadow);z-index:300;font-size:13px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Misc */
.muted{color:var(--muted)}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:14px}
.row{display:flex;gap:8px;align-items:center}
.spacer{flex:1}
.tag{display:inline-block;padding:2px 7px;background:var(--panel2);border-radius:4px;font-size:11px;color:var(--muted);font-weight:500}

/* Print / PDF export */
@media print {
  body { background:#fff !important; color:#000 !important; }
  .app, .sidebar, .modal-wrap, .login-wrap, .toast, #print-only { display:none !important; }
  #print-area { display:block !important; }
}
#print-area{display:none}
.print-page{width:210mm;min-height:297mm;padding:18mm 16mm;margin:0 auto;background:#fff;color:#222;font-family:'Helvetica Neue',Arial,sans-serif;font-size:11pt;line-height:1.45}
.print-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #ff7a2f;padding-bottom:14px;margin-bottom:18px}
.print-brand{font-size:30pt;font-weight:800;letter-spacing:-1px;color:#1a1a1a;line-height:1}
.print-tag{font-size:9pt;color:#666;margin-top:3px;letter-spacing:.5px}
.print-meta{text-align:right;font-size:9.5pt;color:#444}
.print-meta .pi{font-weight:700;color:#ff7a2f;font-size:13pt}
.print-section-title{font-size:9pt;color:#999;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.print-cust{display:flex;justify-content:space-between;margin-bottom:18px;gap:30px}
.print-cust-block{flex:1}
.print-cust .name{font-size:13pt;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.print-cust .addr{color:#555;font-size:10pt}
.print-tbl{width:100%;border-collapse:collapse;margin-bottom:14px;font-size:9.5pt}
.print-tbl thead th{background:#1a1a1a;color:#fff;text-align:left;padding:8px 9px;font-size:9pt;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.print-tbl thead th.num{text-align:right}
.print-tbl tbody td{padding:9px 9px;border-bottom:1px solid #eee;vertical-align:top}
.print-tbl tbody td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.print-tbl tbody tr:nth-child(even){background:#fafafa}
.print-tbl .item-make{font-weight:600;color:#1a1a1a}
.print-tbl .item-desc{font-size:9pt;color:#666;margin-top:1px}
.print-tbl .item-code{font-size:8pt;color:#888;margin-top:1px}
.print-totals{margin-left:auto;width:280px;margin-bottom:18px}
.print-totals tr td{padding:5px 0;font-size:10pt}
.print-totals tr td:first-child{color:#666}
.print-totals tr td:last-child{text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
.print-totals tr.grand td{font-size:13pt;font-weight:700;color:#ff7a2f;border-top:2px solid #1a1a1a;padding-top:8px}
.print-foot{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;margin-top:22px;padding-top:14px;border-top:1px solid #ddd;font-size:9pt;color:#444}
.print-foot .lbl{font-weight:700;color:#1a1a1a;margin-bottom:3px;font-size:9.5pt}
.print-sign{margin-top:38px;display:flex;justify-content:space-between;align-items:flex-end}
.print-sign-line{border-top:1px solid #999;width:180px;text-align:center;padding-top:5px;font-size:9pt;color:#666}
.print-thanks{font-size:9pt;color:#999;font-style:italic}
.print-watermark{position:absolute;bottom:8mm;left:0;right:0;text-align:center;font-size:8pt;color:#bbb;letter-spacing:1px}

/* responsive */
@media (max-width: 760px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;width:240px;transition:left .25s;z-index:100}
  .sidebar.open{left:0}
  .main{padding:18px}
  .form-grid{grid-template-columns:1fr}
  .mobile-menu-btn{display:inline-flex !important}
}
.mobile-menu-btn{display:none}
</style>
</head>

function loadDB(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{
      DB = JSON.parse(raw);
      // migrate: ensure clients array exists, auto-seed from quote names if missing
      if(!DB.clients){
        DB.clients = [];
        const seen = new Set();
        let n = 1;
        DB.quotes.forEach(q=>{
          const key = (q.client||'').trim().toLowerCase();
          if(!key || seen.has(key)) return;
          seen.add(key);
          const cid = `C${String(n++).padStart(4,'0')}`;
          DB.clients.push({id:cid, name:q.client.trim(), contact_person:'', phone:'', email:'', address_l1:'', address_l2:'', city:'', state:'', pincode:'', gstin:'', pan:'', projects:[], notes:'', created:new Date().toISOString()});
          q.client_id = cid;
        });
        // link any other quotes by name
        const map = Object.fromEntries(DB.clients.map(c=>[c.name.toLowerCase(), c.id]));
        DB.quotes.forEach(q=>{ if(!q.client_id) q.client_id = map[(q.client||'').toLowerCase()]; });
        saveDB();
      }
      // migrate: convert legacy q.amount_paid number into a single payments[] entry
      let migratedPayments = false;
      DB.quotes.forEach(q=>{
        if(!Array.isArray(q.payments)){
          q.payments = [];
          if((+q.amount_paid||0) > 0){
            q.payments.push({
              id: 'PMT' + Date.now() + Math.floor(Math.random()*1000),
              date: (q.updated || q.created || new Date().toISOString()).slice(0,10),
              amount: +q.amount_paid,
              mode: 'Other',
              ref: '',
              note: 'Migrated from earlier Amount Paid field',
            });
          }
          migratedPayments = true;
        }
      });
      if(migratedPayments){ _suppressAutoSnap = true; saveDB(); _suppressAutoSnap = false; }
      // One-time data patches — fix known typos in legacy data. Idempotent.
      const DATA_PATCHES = [
        { match: q => q.pi_no === 'PI-26-113' && q.date === '2007-03-26', set: { date: '2026-03-26' } },
        { match: q => q.pi_no === 'PI-26-87'  && q.date === '2011-03-26', set: { date: '2026-03-26' } },
        { match: q => q.pi_no === 'PI-26-86'  && q.date === '2011-03-26', set: { date: '2026-03-26' } },
        { match: q => q.pi_no === 'PI-26-85'  && q.date === '2011-03-26', set: { date: '2026-03-26' } },
        { match: q => q.pi_no === 'PI-26-17'  && q.date === '2011-03-26', set: { date: '2026-03-26' } },
        { match: q => q.pi_no === 'PI-26-88'  && q.date === '2018-03-26', set: { date: '2026-03-26' } },
      ];
      let patched = false;
      DB.quotes.forEach(q=>{
        DATA_PATCHES.forEach(p=>{
          if(p.match(q)){ Object.assign(q, p.set); patched = true; }
        });
      });
      if(patched){ _suppressAutoSnap = true; saveDB(); _suppressAutoSnap = false; }
      // Ensure leads array exists
      if(!Array.isArray(DB.leads)){
        DB.leads = [];
        _suppressAutoSnap = true; saveDB(); _suppressAutoSnap = false;
      }
      // Ensure company-wide default Terms & Conditions exist (used by Settings + print template)
      if(!DB.company) DB.company = {};
      if(!DB.company.default_terms){
        DB.company.default_terms = BUILTIN_DEFAULT_TERMS;
        _suppressAutoSnap = true; saveDB(); _suppressAutoSnap = false;
      }
      return;
    }catch(e){ console.error(e); }
  }
  DB = JSON.parse(JSON.stringify(SEED_DATA));
  saveDB();
}
function saveDB(){

/* -------- Firebase Cloud Sync (single shared database document) -------- */
const CLOUD_COLLECTION = 'techtoys';
const CLOUD_DOC = 'appState';
let CLOUD_DB = null;
let CLOUD_REF = null;
let CLOUD_READY = false;
let CLOUD_LOADING = false;
let CLOUD_IMPORTING = false;
let CLOUD_SAVE_TIMER = null;
let CLOUD_LAST_SAVE = '';
let CLOUD_PENDING_SAVE = false;

function cloudStatusText(txt){
  const footer = document.querySelector('.nav-footer');
  if(!footer) return;
  let el = document.getElementById('cloudStatus');
  if(!el){
    el = document.createElement('div');
    el.id = 'cloudStatus';
    el.style.marginTop = '6px';
    el.style.fontSize = '11px';
    el.style.fontWeight = '600';
    footer.appendChild(el);
  }
  el.textContent = txt;
}

function showCloudError(err){
  const msg = (err && (err.message || err.code)) ? (err.message || err.code) : String(err || 'Unknown error');
  console.error('Firebase cloud error:', err);
  cloudStatusText('⚠ Cloud error');
  toast('Cloud save failed. Check Firestore Rules.');
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;z-index:9999;background:#3a1515;color:#ffdddd;border:1px solid #ef4444;border-radius:10px;padding:12px 14px;font-size:13px;box-shadow:0 10px 40px rgba(0,0,0,.5)';
  box.innerHTML = `<b>Firebase is not allowing save.</b><br>Open Firebase → Firestore Database → Rules and temporarily allow read/write for testing.<br><small>${escapeHTML(msg).slice(0,240)}</small><button style="float:right;margin-left:8px;color:#fff" onclick="this.parentElement.remove()">✕</button>`;
  document.body.appendChild(box);
  setTimeout(()=>{ try{ box.remove(); }catch(e){} }, 12000);
}

function initCloudSync(){
  if(CLOUD_LOADING || CLOUD_READY) return;
  CLOUD_LOADING = true;
  cloudStatusText('☁ Connecting to Firebase…');
  try{
    if(!window.firebase || !firebase.firestore){
      CLOUD_LOADING = false;
      cloudStatusText('⚠ Firebase SDK not loaded');
      console.warn('Firebase SDK not loaded. Data will stay local until Firebase loads.');
      return;
    }
    if(!firebase.apps.length){ firebase.initializeApp(FIREBASE_CONFIG); }
    CLOUD_DB = firebase.firestore();
    CLOUD_REF = CLOUD_DB.collection(CLOUD_COLLECTION).doc(CLOUD_DOC);

    // Useful manual test from browser console: forceCloudPush()
    window.forceCloudPush = async function(){
      if(!DB) loadDB();
      DB.updated = new Date().toISOString();
      const payload = JSON.parse(JSON.stringify(DB));
      await CLOUD_REF.set({
        db: payload,
        updated: firebase.firestore.FieldValue.serverTimestamp(),
        updated_iso: DB.updated,
        client_hint: navigator.userAgent || 'browser'
      }, { merge: true });
      CLOUD_LAST_SAVE = DB.updated;
      cloudStatusText('☁ Force pushed to Firebase');
      toast('Force pushed to Firebase');
      return true;
    };

    // Real-time listener: every device receives the same DB automatically.
    if(window.__techToysCloudUnsub) window.__techToysCloudUnsub();
    window.__techToysCloudUnsub = CLOUD_REF.onSnapshot(doc=>{
      CLOUD_READY = true;
      CLOUD_LOADING = false;

      if(doc.exists && doc.data() && doc.data().db){
        const remoteDB = doc.data().db;
        const remoteUpdated = remoteDB.updated || doc.data().updated_iso || '';

        // Avoid unnecessary re-render loops from our own last save.
        if(remoteUpdated && remoteUpdated === CLOUD_LAST_SAVE){
          cloudStatusText('☁ Saved to cloud');
          return;
        }

        CLOUD_IMPORTING = true;
        DB = remoteDB;
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }catch(e){}
        CLOUD_IMPORTING = false;
        CLOUD_LAST_SAVE = remoteUpdated;
        cloudStatusText('☁ Live sync active');
        renderAfterCloudLoad();
      } else {
        // First device creates the shared cloud document using current local data/seed.
        cloudStatusText('☁ Creating cloud database…');
        forceCloudPush().catch(showCloudError);
      }

      if(CLOUD_PENDING_SAVE){
        CLOUD_PENDING_SAVE = false;
        queueCloudSave(true);
      }
    }, err=>{
      CLOUD_LOADING = false;
      CLOUD_READY = false;
      showCloudError(err);
    });
  }catch(err){
    CLOUD_LOADING = false;
    showCloudError(err);
  }
}

function renderAfterCloudLoad(){
  if(!DB) return;
  const navUser = document.getElementById('navUser');
  if(navUser) navUser.textContent = (DB.company && (DB.company.contact_person || DB.company.name)) || 'Tech Toys';
  renderFYSelector();
  const [view, param] = parseHash();
  navigate(view, param);
}

function queueCloudSave(immediate=false){
  if(CLOUD_IMPORTING || !DB) return;
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }catch(e){}
  if(!CLOUD_READY || !CLOUD_DB || !CLOUD_REF){
    CLOUD_PENDING_SAVE = true;
    return;
  }
  clearTimeout(CLOUD_SAVE_TIMER);
  const doSave = async ()=>{
    try{
      DB.updated = new Date().toISOString();
      const payload = JSON.parse(JSON.stringify(DB));
      await CLOUD_REF.set({
        db: payload,
        updated: firebase.firestore.FieldValue.serverTimestamp(),
        updated_iso: DB.updated,
        client_hint: navigator.userAgent || 'browser'
      }, { merge: true });
      CLOUD_LAST_SAVE = DB.updated;
      cloudStatusText('☁ Saved to Firebase');
    }catch(err){
      showCloudError(err);
    }
  };
  CLOUD_SAVE_TIMER = setTimeout(doSave, immediate ? 0 : 250);
}

/* -------- Snapshots (versioned saves) -------- */
const SNAPSHOTS_KEY = 'techToys_snapshots';
const SNAPSHOT_CAP = 20;

function loadSnapshots(){
  try { return JSON.parse(localStorage.getItem(SNAPSHOTS_KEY) || '[]'); }
  catch(e){ return []; }
}
function persistSnapshots(arr){
  // Trim to cap (keep newest)
  arr.sort((a,b)=>b.created.localeCompare(a.created));
  if(arr.length > SNAPSHOT_CAP) arr = arr.slice(0, SNAPSHOT_CAP);
  try {
    localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(arr));
  } catch(e){
    // QuotaExceeded — drop oldest until it fits
    while(arr.length > 1){
      arr.pop();
      try { localStorage.setItem(SNAPSHOTS_KEY, JSON.stringify(arr)); return arr; }
      catch(e2){}
    }
    throw e;
  }
  return arr;
}
function snapshotSummary(db){
  const totalValue = (db.quotes||[]).reduce((s,q)=>{
    const sub = (q.items||[]).reduce((a,it)=>a+(it.qty||0)*(it.price||0),0);
    const aft = Math.max(0, sub - (q.discount||0));
    return s + aft + aft*((q.tax_pct||0)/100);
  }, 0);
  return {
    quotes: (db.quotes||[]).length,
    clients: (db.clients||[]).length,
    products: (db.products||[]).length,
    totalValue,
  };
}
function addSnapshot(label, auto){
  const snaps = loadSnapshots();
  const snap = {
    id: 'S' + Date.now(),
    created: new Date().toISOString(),
    label: label || (auto ? 'Auto-save' : 'Manual save'),
    auto: !!auto,
    summary: snapshotSummary(DB),
    data: JSON.parse(JSON.stringify(DB)),
  };
  snaps.unshift(snap);
  persistSnapshots(snaps);
  return snap;
}
function deleteSnapshot(id){
  const snaps = loadSnapshots().filter(s=>s.id!==id);
  persistSnapshots(snaps);
}
function restoreSnapshot(id){
  const snaps = loadSnapshots();
  const snap = snaps.find(s=>s.id===id);
  if(!snap) return false;
  // Save a "pre-restore" snapshot so the action is undoable
  addSnapshot(`Pre-restore safety (before loading ${fmtSnapshotDate(snap.created)})`, true);
  DB = JSON.parse(JSON.stringify(snap.data));
  // Don't trigger another auto-snapshot from the save below
  _suppressAutoSnap = true;
  saveDB();
  _suppressAutoSnap = false;
  return true;
}
function lastSnapshot(){
  const snaps = loadSnapshots();
  return snaps[0] || null;
}
let _suppressAutoSnap = false;
function maybeAutoSnapshot(){
  if(_suppressAutoSnap) return;
  const last = lastSnapshot();
  const todayStr = new Date().toISOString().slice(0,10);
  // Auto-snapshot once per calendar day
  if(!last || last.created.slice(0,10) !== todayStr){
    try { addSnapshot('Auto-save (first edit of the day)', true); }
    catch(e){ console.warn('snapshot failed', e); }
  }
}
function fmtSnapshotDate(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  return d.toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function fmtRelativeTime(iso){
  if(!iso) return 'never';
  const d = new Date(iso);
  if(isNaN(d)) return iso;
  const ms = Date.now() - d.getTime();
  const min = Math.round(ms/60000);
  if(min < 1) return 'just now';
  if(min < 60) return `${min} min ago`;
  const hr = Math.round(min/60);
  if(hr < 24) return `${hr} hr ago`;
  const day = Math.round(hr/24);
  if(day === 1) return 'yesterday';
  if(day < 7) return `${day} days ago`;
  return d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}

function manualSaveSnapshot(){
  const label = prompt('Optional label for this snapshot (e.g. "End of week", "Before client cleanup"):', '');
  if(label === null) return; // cancelled
  // Suppress the auto-snapshot side-effect from any saveDB call during this action
  _suppressAutoSnap = true;
  try {
    const snap = addSnapshot(label.trim() || 'Manual save', false);
    toast(`Snapshot saved: ${fmtSnapshotDate(snap.created)}`);
  } finally {
    _suppressAutoSnap = false;
  }
  // Refresh whichever view we're on
  if(CURRENT_VIEW==='settings') renderSettings();
  else if(CURRENT_VIEW==='dashboard') renderDashboard();
}

function confirmRestoreSnapshot(id){
  const snap = loadSnapshots().find(s=>s.id===id);
  if(!snap) return;
  const msg = `Restore the snapshot from ${fmtSnapshotDate(snap.created)}?\n\n`
    + `This will replace your current data:\n`
    + `  Quotes:   ${(DB.quotes||[]).length} → ${snap.summary.quotes}\n`
    + `  Clients:  ${(DB.clients||[]).length} → ${snap.summary.clients}\n`
    + `  Products: ${(DB.products||[]).length} → ${snap.summary.products}\n\n`
    + `A safety snapshot of the current state will be saved automatically before restoring, so you can undo this.`;
  if(!confirm(msg)) return;
  if(restoreSnapshot(id)){
    toast('Snapshot restored');
    navigate('dashboard');
  } else {
    toast('Restore failed', 'error');
  }
}

function confirmDeleteSnapshot(id){
  const snap = loadSnapshots().find(s=>s.id===id);
  if(!snap) return;
  if(!confirm(`Delete the snapshot from ${fmtSnapshotDate(snap.created)}? This cannot be undone.`)) return;
  deleteSnapshot(id);
  toast('Snapshot deleted');
  if(CURRENT_VIEW==='settings') renderSettings();
  else if(CURRENT_VIEW==='dashboard') renderDashboard();
}

/* -------- Financial Year filter (global) -------- */
const FY_KEY = 'techToys_fy';
let CURRENT_FY = localStorage.getItem(FY_KEY) || 'current';

function quoteFY(q){
  if(!q || !q.date) return null;
  const d = new Date(q.date);
  if(isNaN(d)) return null;
  const y = d.getFullYear(), m = d.getMonth(); // m: 0=Jan
  const fyStart = m >= 3 ? y : y - 1; // April (3) onwards = current FY; Jan-Mar = previous
  return `FY ${fyStart}-${String(fyStart+1).slice(-2)}`;
}
function currentFY(){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const fyStart = m >= 3 ? y : y - 1;
  return `FY ${fyStart}-${String(fyStart+1).slice(-2)}`;
}
function activeFY(){
  return CURRENT_FY === 'current' ? currentFY() : CURRENT_FY;
}
function listAvailableFYs(){
  const fys = new Set();
  (DB && DB.quotes ? DB.quotes : []).forEach(q=>{ const f = quoteFY(q); if(f) fys.add(f); });
  fys.add(currentFY()); // always include current FY even if no quotes
  return Array.from(fys).sort().reverse();
}
function filterQuotesByFY(quotes){
  if(CURRENT_FY === 'all') return quotes;
  const target = activeFY();
  return quotes.filter(q => quoteFY(q) === target);
}
function changeFY(val){
  CURRENT_FY = val;
  localStorage.setItem(FY_KEY, val);
  renderFYSelector();
  // Re-render whichever filterable view we're on
  if(CURRENT_VIEW==='dashboard') renderDashboard();
  else if(CURRENT_VIEW==='quotes') renderQuotes();
  else if(CURRENT_VIEW==='clients') renderClients();
  else if(CURRENT_VIEW==='client') {
    const id = (location.hash.split('/')[1])||'';
    if(id) renderClientDetail(id);
  }
}
function renderFYSelector(){
  const wrap = document.getElementById('fySelectorWrap');

  wrap.innerHTML = `
    <label>Financial Year</label>
    <select id="fySelect" onchange="changeFY(this.value)">
      <option value="current" ${sel==='current'?'selected':''}>Current (${currentFY()})</option>
      <option value="all" ${sel==='all'?'selected':''}>All Time</option>
      <option disabled>──────────</option>
      ${fys.map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('')}
    </select>
  `;
}
function fyLabel(){

}

/* -------- Auth -------- */
async function sha256(s){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function login(pwd){
  const stored = localStorage.getItem(PWD_KEY) || DEFAULT_PWD_SHA;
  const h = await sha256(pwd);
  if(h === stored){
    sessionStorage.setItem(SESSION_KEY, '1');
    return true;
  }
  return false;
}
function isLoggedIn(){ return sessionStorage.getItem(SESSION_KEY) === '1'; }
function logout(){ sessionStorage.removeItem(SESSION_KEY); location.reload(); }
async function changePwd(oldP, newP){
  const stored = localStorage.getItem(PWD_KEY) || DEFAULT_PWD_SHA;
  const h = await sha256(oldP);
  if(h !== stored) return false;
  localStorage.setItem(PWD_KEY, await sha256(newP));
  return true;
}

/* -------- Utilities -------- */
const fmtINR = n => '₹' + (Number(n)||0).toLocaleString('en-IN', {maximumFractionDigits: 0});
const fmtINR2 = n => '₹' + (Number(n)||0).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
const fmtNum = n => (Number(n)||0).toLocaleString('en-IN');
const fmtDate = d => {
  if(!d) return '—';
  const dt = new Date(d);
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
};
const today = () => new Date().toISOString().slice(0,10);
const escapeHTML = s => String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function quoteSubtotal(q){ return q.items.reduce((s,it)=>s + (it.qty||0)*(it.price||0), 0); }
function quoteAfterDiscount(q){ return Math.max(0, quoteSubtotal(q) - (q.discount||0)); }
function quoteTax(q){ return quoteAfterDiscount(q) * (q.tax_pct||0)/100; }
function quoteTotal(q){ return quoteAfterDiscount(q) + quoteTax(q); }
function quoteCollected(q){
  if(Array.isArray(q.payments)) return q.payments.reduce((s,p)=>s+(+p.amount||0), 0);
  return +q.amount_paid || 0; // legacy fallback before payments[] was migrated
}
function quoteOutstanding(q){
  if(q.status==='Lost') return 0;
  return Math.max(0, quoteTotal(q) - quoteCollected(q));
}

function toast(msg, type='info'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type==='error' ? 'var(--red)' : 'var(--accent)';
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), 2200);
}

function openModal(html){
  const m = document.getElementById('modal');
  m.innerHTML = html;
  document.getElementById('modalWrap').classList.add('show');
}
function closeModal(){ document.getElementById('modalWrap').classList.remove('show'); }

/* -------- Navigation -------- */
const NAV = [
  {id:'dashboard', label:'Dashboard', ico:'📊'},
  {id:'leads', label:'Leads', ico:'🎯'},
  {id:'quotes', label:'Quotations', ico:'📋'},
  {id:'new-quote', label:'New Quote', ico:'➕'},
  {id:'clients', label:'Clients', ico:'👥'},
  {id:'products', label:'Products', ico:'📦'},
  {id:'settings', label:'Settings', ico:'⚙️'},
];
function renderNav(){
  const el = document.getElementById('navList');
  el.innerHTML = NAV.map(n=>`
    <div class="nav-item ${n.id===CURRENT_VIEW?'active':''}" onclick="navigate('${n.id}')">
      <span class="ico">${n.ico}</span><span>${n.label}</span>
    </div>
  `).join('');
}
function navigate(view, params){
  CURRENT_VIEW = view;
  location.hash = '#' + view + (params ? '/' + params : '');
  renderNav();
  renderFYSelector();
  document.getElementById('sidebar').classList.remove('open');
  if(view==='dashboard') renderDashboard();
  else if(view==='quotes') renderQuotes();
  else if(view==='quote') renderQuoteDetail(params);
  else if(view==='new-quote') renderNewQuote();
  else if(view==='edit-quote') renderNewQuote(params);
  else if(view==='leads') renderLeads();
  else if(view==='products') renderProducts();
  else if(view==='clients') renderClients();
  else if(view==='client') renderClientDetail(params);
  else if(view==='settings') renderSettings();
  document.getElementById('mainView').scrollTop = 0;
}
function parseHash(){
  const h = (location.hash||'').replace(/^#/, '');
  if(!h) return ['dashboard'];
  return h.split('/');
}

/* ============================================================

  const qs = filterQuotesByFY(DB.quotes);
  const total = qs.length;
  const totalValue = qs.reduce((s,q)=>s+quoteTotal(q),0);
  const won = qs.filter(q=>q.status==='Won' || q.status==='Paid');
  const wonVal = won.reduce((s,q)=>s+quoteTotal(q),0);

  const outstanding = qs.reduce((s,q)=>s+quoteOutstanding(q),0);

  qs.forEach(q=>{

      byStatus[q.status].val += quoteTotal(q);
    }
  });

  document.getElementById('mainView').innerHTML = `
    <div class="page-head">
      <div>
        <button class="btn btn-icon mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div style="display:inline-block;vertical-align:middle">
          <div class="page-title">Dashboard <span class="fy-badge">${escapeHTML(fyLabel())}</span></div>
          <div class="page-sub">Overview of quotations and pipeline ${CURRENT_FY==='all'?'(all time)':'for '+escapeHTML(activeFY())}</div>
        </div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="navigate('new-quote')">➕ New Quote</button>
      </div>
    </div>

    ${(()=>{
      const last = lastSnapshot();
      if(!last) return `<div style="background:var(--amber-dim);border:1px solid #5a4010;border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:13px;color:#fed28a;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">

        <button class="btn btn-sm" onclick="manualSaveSnapshot()" style="background:#3a2a10;border-color:#5a4010;color:#fed28a">💾 Save snapshot now</button>

      return `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:18px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">

        <div class="kpi-label">Total Quotes</div>
        <div class="kpi-value">${total}</div>
        <div class="kpi-sub">${pending} pending</div>
      </div>
      <div class="kpi accent">
        <div class="kpi-label">Total Quoted</div>
        <div class="kpi-value">${fmtINR(totalValue)}</div>
        <div class="kpi-sub">All quotations</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Won / Paid Value</div>
        <div class="kpi-value">${fmtINR(wonVal)}</div>
        <div class="kpi-sub">${won.length} deals</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Collected</div>
        <div class="kpi-value">${fmtINR(paidVal)}</div>
        <div class="kpi-sub">Payments received</div>
      </div>
      <div class="kpi amber">

        <div class="kpi-value">${fmtINR(outstanding)}</div>

        return leadDaysIdle(b) - leadDaysIdle(a);

            ${showing.map(l=>{

              const stale = leadIsStale(l);
              return `<tr onclick="openLeadModal('${l.id}')" style="${stale?'background:rgba(251,191,36,0.06)':''}">
                <td><b>${escapeHTML(l.client_name||'(no client)')}</b>${l.project_name?`<div class="muted" style="font-size:12px">${escapeHTML(l.project_name)}</div>`:''}</td>
                <td><span class="tag">${escapeHTML(l.source||'—')}</span></td>
                <td class="num">${l.estimated_value ? fmtINR(l.estimated_value) : '<span class="muted">—</span>'}</td>
                <td class="muted">${l.next_followup ? fmtDate(l.next_followup) : '—'}</td>
                <td style="color:${stale?'var(--amber)':'var(--muted)'}"><b>${idle}d</b>${stale?' ⚠':''}</td>
                <td><button class="btn btn-sm btn-primary" onclick="event.stopPropagation();convertLeadToQuote('${l.id}')">→ Convert</button></td>
              </tr>`;

        </table>
      </div>`;
    })()}

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Pipeline by status</div>
          <div class="card-sub">Distribution across quote stages</div>
        </div>
      </div>
      <table class="tbl">
        <thead><tr><th>Status</th><th class="num">Count</th><th class="num">Value</th><th>%</th></tr></thead>
        <tbody>

        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Recent quotations</div>
          <div class="card-sub">Last 8 by date</div>
        </div>

      </div>
      <table class="tbl tbl-clickable">
        <thead><tr><th>Client</th><th>Project</th><th>PI No.</th><th>Date</th><th>Status</th><th class="num">Total</th><th class="num">Collected</th><th class="num">Outstanding</th></tr></thead>
        <tbody>
          ${recent.map(q=>{
            const linked = q.client_id ? (DB.clients||[]).find(c=>c.id===q.client_id) : null;
            const clientName = linked ? linked.name : (q.client||'');
            const projectName = q.project_name || (linked ? '' : q.client) || '';
            const collected = quoteCollected(q);
            const outstanding = quoteOutstanding(q);
            return `
            <tr onclick="navigate('quote', '${q.id}')">
              <td><b>${escapeHTML(clientName)}</b></td>
              <td>${escapeHTML(projectName)}</td>
              <td class="muted">${escapeHTML(q.pi_no||'')}</td>
              <td class="muted">${fmtDate(q.date)}</td>

              <td class="num">${fmtINR(quoteTotal(q))}</td>

              <td class="num" style="color:${outstanding>0?'var(--amber)':'var(--muted)'}">${fmtINR(outstanding)}</td>
            </tr>

        </tbody>
      </table>
    </div>
  `;

/* ============================================================
   QUOTES LIST
   ============================================================ */
let quotesFilter = {q:'', status:''};
function renderQuotes(){
  let qs = filterQuotesByFY([...DB.quotes]);
  const totalInFY = qs.length;
  if(quotesFilter.q){
    const t = quotesFilter.q.toLowerCase();
    qs = qs.filter(q=>{
      const linked = q.client_id ? (DB.clients||[]).find(c=>c.id===q.client_id) : null;
      const hay = ((linked?linked.name:q.client)||'') + ' ' + (q.project_name||'') + ' ' + (q.client||'') + ' ' + (q.pi_no||'');
      return hay.toLowerCase().includes(t);
    });
  }
  if(quotesFilter.status) qs = qs.filter(q=>q.status===quotesFilter.status);
  qs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const totalVal = qs.reduce((s,q)=>s+quoteTotal(q),0);
  const totalOut = qs.reduce((s,q)=>s+quoteOutstanding(q),0);

  document.getElementById('mainView').innerHTML = `
    <div class="page-head">
      <div>
        <button class="btn btn-icon mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <div style="display:inline-block;vertical-align:middle">
          <div class="page-title">Quotations <span class="fy-badge">${escapeHTML(fyLabel())}</span></div>
          <div class="page-sub">${qs.length} of ${totalInFY} ${CURRENT_FY==='all'?'(all time)':'in '+escapeHTML(activeFY())} · ${fmtINR(totalVal)} total · ${fmtINR(totalOut)} outstanding</div>
        </div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="navigate('new-quote')">➕ New Quote</button>
      </div>
    </div>

    <div class="search-row">
      <input id="qSearch" placeholder="Search client, project or PI number..." value="${escapeHTML(quotesFilter.q)}">
      <select id="qStatus">
        <option value="">All statuses</option>
        ${['Draft','Sent','Won','Paid','Lost'].map(s=>`<option value="${s}" ${quotesFilter.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>

    <div class="card" style="padding:0">
      <table class="tbl tbl-clickable">
        <thead><tr><th>Client</th><th>Project</th><th>PI No.</th><th>Date</th><th>Items</th><th>Status</th><th class="num">Total</th><th class="num">Collected</th><th class="num">Outstanding</th></tr></thead>
        <tbody>
          ${qs.length === 0 ? '<tr><td colspan="9" class="empty">No quotations match your filters.</td></tr>' :
            qs.map(q=>{
              const linked = q.client_id ? (DB.clients||[]).find(c=>c.id===q.client_id) : null;
              const clientName = linked ? linked.name : (q.client||'');
              const projectName = q.project_name || (linked ? '' : q.client) || '';
              const collected = quoteCollected(q);
              const outstanding = quoteOutstanding(q);
              return `
              <tr onclick="navigate('quote', '${q.id}')">
                <td><b>${escapeHTML(clientName)}</b></td>
                <td>${escapeHTML(projectName)}</td>
                <td class="muted">${escapeHTML(q.pi_no||'')}</td>
                <td class="muted">${fmtDate(q.date)}</td>
                <td class="muted">${q.items.length}</td>
                <td><span class="pill pill-${q.status.toLowerCase()}">${q.status}</span></td>
                <td class="num"><b>${fmtINR(quoteTotal(q))}</b></td>
                <td class="num" style="color:${collected>0?'var(--green)':'var(--muted)'}">${fmtINR(collected)}</td>
                <td class="num" style="color:${outstanding>0?'var(--amber)':'var(--muted)'}">${fmtINR(outstanding)}</td>
              </tr>
            `;}).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('qSearch').oninput = e=>{ quotesFilter.q=e.target.value; renderQuotes(); };
  document.getElementById('qStatus').onchange = e=>{ quotesFilter.status=e.target.value; renderQuotes(); };
}

function updateQuoteField(id, field, val){
  const q = DB.quotes.find(x=>x.id===id);
  if(!q) return;
  q[field] = val;
  q.updated = new Date().toISOString();
  saveDB();
  if(field==='status') renderQuoteDetail(id);
  toast('Saved');
}

function duplicateQuote(id){
  const src = DB.quotes.find(x=>x.id===id);
  if(!src) return;
  const newId = nextQuoteId();
  const newPi = nextPiNo();
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = newId;
  copy.pi_no = newPi;
  // Keep client + client_id link intact; only mark the project as a copy
  copy.project_name = (src.project_name || src.client || '') + ' (copy)';
  copy.date = today();
  copy.status = 'Draft';
  copy.amount_paid = 0;
  copy.payments = []; // duplicates start with no payments
  copy.created = new Date().toISOString();
  copy.updated = copy.created;
  DB.quotes.push(copy);
  saveDB();
  toast('Quote duplicated');
  navigate('edit-quote', newId);
}

/* -------- Payments -------- */
const PAYMENT_MODES = ['Cash','Bank Transfer','Cheque','UPI','Card','Other'];

function recomputeAmountPaid(q){
  q.amount_paid = (q.payments||[]).reduce((s,p)=>s+(+p.amount||0), 0);
}

function maybeAutoFlipPaid(q){
  // Auto-progress quote status based on collected amount.
  // Sent → Won when an advance is recorded (any payment > 0 but < total).
  // Sent/Won → Paid when fully collected.
  // Never touches Draft or Lost.
  const total = quoteTotal(q);
  const collected = quoteCollected(q);
  if(total <= 0) return null;
  if(collected >= total && (q.status==='Sent' || q.status==='Won')){
    q.status = 'Paid';
    return 'Paid';
  }
  if(collected > 0 && collected < total && q.status==='Sent'){
    q.status = 'Won';
    return 'Won';
  }
  return null;
}

function openPaymentModal(quoteId, paymentId){
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q) return;
  const editing = paymentId ? (q.payments||[]).find(p=>p.id===paymentId) : null;
  const p = editing || {date: today(), amount: quoteOutstanding(q), mode: 'Bank Transfer', ref: '', note: ''};
  openModal(`
    <div class="modal-head">
      <div class="modal-title">${editing ? 'Edit payment' : 'Record payment'}</div>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div><span class="muted">Quote:</span> <b>${escapeHTML(q.pi_no||'')}</b> · ${escapeHTML(q.client||'')}</div>
        <div><span class="muted">Outstanding:</span> <b style="color:var(--amber)">${fmtINR(quoteOutstanding(q))}</b></div>
      </div>
      <div class="form-grid">
        <div class="field"><label>Date *</label><input id="ep_date" type="date" value="${p.date}"></div>
        <div class="field"><label>Amount (₹) *</label><input id="ep_amt" type="number" step="0.01" min="0" value="${p.amount||''}" autofocus></div>
        <div class="field"><label>Mode *</label>
          <select id="ep_mode">
            ${PAYMENT_MODES.map(m=>`<option value="${m}" ${p.mode===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Reference</label><input id="ep_ref" value="${escapeHTML(p.ref||'')}" placeholder="Cheque #, UPI ref, txn ID..."></div>
        <div class="field full"><label>Note</label><input id="ep_note" value="${escapeHTML(p.note||'')}" placeholder="Optional"></div>
      </div>
    </div>
    <div class="modal-foot">
      ${editing ? `<button class="btn btn-danger" style="margin-right:auto" onclick="deletePayment('${q.id}','${editing.id}')">🗑 Delete</button>` : ''}
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment('${q.id}','${editing?editing.id:''}')">${editing?'Save changes':'Record payment'}</button>
    </div>
  `);
}

function savePayment(quoteId, paymentId){
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q) return;
  if(!Array.isArray(q.payments)) q.payments = [];
  const date = document.getElementById('ep_date').value;
  const amount = +document.getElementById('ep_amt').value || 0;
  const mode = document.getElementById('ep_mode').value;
  const ref = document.getElementById('ep_ref').value.trim();
  const note = document.getElementById('ep_note').value.trim();
  if(!date){ alert('Please pick a date'); return; }
  if(amount <= 0){ alert('Amount must be greater than 0'); return; }
  // Warn (but allow) overpayment
  const otherPaid = quoteCollected(q) - (paymentId ? (q.payments.find(p=>p.id===paymentId)||{}).amount || 0 : 0);
  if(otherPaid + amount > quoteTotal(q) + 1){
    if(!confirm(`This payment will make total collected (${fmtINR(otherPaid+amount)}) exceed the grand total (${fmtINR(quoteTotal(q))}). Save anyway?`)) return;
  }
  if(paymentId){
    const idx = q.payments.findIndex(p=>p.id===paymentId);
    if(idx>=0) q.payments[idx] = {...q.payments[idx], date, amount, mode, ref, note};
  } else {
    q.payments.push({
      id: 'PMT' + Date.now() + Math.floor(Math.random()*1000),
      date, amount, mode, ref, note,
    });
  }
  recomputeAmountPaid(q);
  const flipped = maybeAutoFlipPaid(q);
  q.updated = new Date().toISOString();
  saveDB();
  closeModal();
  toast(flipped ? `Payment saved · status auto-set to ${flipped}` : 'Payment saved');
  renderQuoteDetail(q.id);
}

function deletePayment(quoteId, paymentId){
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q || !Array.isArray(q.payments)) return;
  const p = q.payments.find(x=>x.id===paymentId);
  if(!p) return;
  if(!confirm(`Delete payment of ${fmtINR(p.amount)} dated ${fmtDate(p.date)}? This cannot be undone.`)) return;
  q.payments = q.payments.filter(x=>x.id!==paymentId);
  recomputeAmountPaid(q);
  q.updated = new Date().toISOString();
  saveDB();
  closeModal();
  toast('Payment deleted');
  renderQuoteDetail(q.id);
}

/* -------- Expenses (per quote) -------- */
function quoteExpensesTotal(q){
  return (q.expenses || []).reduce((s,e)=>s+(+e.amount||0), 0);
}
function addExpenseRow(quoteId){
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q) return;
  if(!Array.isArray(q.expenses)) q.expenses = [];
  q.expenses.push({
    id: 'EXP' + Date.now() + Math.floor(Math.random()*1000),
    date: today(),
    category: 'Product',
    description: '',
    amount: 0,
  });
  q.updated = new Date().toISOString();
  saveDB();
  renderQuoteDetail(quoteId);
  // focus the new row's description field
  setTimeout(()=>{
    const inputs = document.querySelectorAll(`input[data-eq="${quoteId}"][data-ef="description"]`);
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 30);
}
function removeExpenseRow(quoteId, idx){
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q || !Array.isArray(q.expenses) || idx >= q.expenses.length) return;
  const e = q.expenses[idx];
  if((+e.amount||0) > 0 || e.description){
    if(!confirm(`Remove expense "${e.description||'(no description)'}" of ${fmtINR(e.amount||0)}?`)) return;
  }
  q.expenses.splice(idx, 1);
  q.updated = new Date().toISOString();
  saveDB();
  renderQuoteDetail(quoteId);
}
function onExpenseInput(ev){
  const el = ev.target;
  const quoteId = el.dataset.eq;
  const idx = +el.dataset.ei;
  const field = el.dataset.ef;
  const q = DB.quotes.find(x=>x.id===quoteId);
  if(!q || !Array.isArray(q.expenses) || idx >= q.expenses.length) return;
  let val = el.value;
  if(field === 'amount') val = +val || 0;
  q.expenses[idx][field] = val;
  q.updated = new Date().toISOString();
  saveDB();
  // Update only the totals row in-place (don't re-render the table — would steal focus)
  const totalEl = document.getElementById('qd_exp_total');
  const marginEl = document.getElementById('qd_margin');
  if(totalEl) totalEl.textContent = fmtINR(quoteExpensesTotal(q));
  if(marginEl){
    const m = quoteCollected(q) - quoteExpensesTotal(q);
    marginEl.textContent = fmtINR(m);
    marginEl.style.color = m >= 0 ? 'var(--green)' : 'var(--red)';
  }
}

function deleteQuote(id){
  if(!confirm('Delete this quotation? This cannot be undone.')) return;
  DB.quotes = DB.quotes.filter(q=>q.id!==id);
  saveDB();
  toast('Deleted');
  navigate('quotes');
}

function nextQuoteId(){
  let n = 1;
  while(DB.quotes.find(q=>q.id===`Q${String(n).padStart(4,'0')}`)) n++;
  return `Q${String(n).padStart(4,'0')}`;
}
function nextPiNo(){
  const seq = (DB.next_pi_seq || 250) + 1;
  DB.next_pi_seq = seq;
  return `PI-25-${String(seq).padStart(3,'0')}`;
}

function onClientInput(e){
  ensureClients();
  const txt = e.target.value.trim().toLowerCase();

    const cur = DB.clients.find(c=>c.id===editingQuote.client_id);

      delete editingQuote.client_id;
      const link = document.getElementById('eq_client_link');
      if(link) link.innerHTML = 'Unlinked. Type to search or pick another client.';
    }
  }
  if(txt.length < 1){ hideClientAC(); return; }
  const matches = DB.clients.filter(c => (c.name+' '+(c.contact_person||'')+' '+(c.gstin||'')+' '+(c.city||'')).toLowerCase().includes(txt)).slice(0, 10);
  showClientAC(matches);
}
function showClientAC(items){
  const list = document.getElementById('clientAcList');
  if(!list) return;
  if(items.length === 0){
    list.innerHTML = `<div class="ac-item" style="color:var(--muted)">No clients match. <a href="#" onclick="event.preventDefault();editClient()" style="margin-left:6px">+ Create new</a></div>`;
    list.classList.add('show');
    list._sel = -1;
    return;
  }
  list.innerHTML = items.map((c,j)=>`
    <div class="ac-item" data-cid="${c.id}" data-j="${j}">
      <div><span class="ac-make">${escapeHTML(c.name)}</span> ${c.gstin?`<span class="ac-meta">GST: ${escapeHTML(c.gstin)}</span>`:''}</div>
      <div class="ac-desc">${[c.contact_person,c.phone,c.city].filter(Boolean).map(escapeHTML).join(' · ')}</div>
    </div>
  `).join('');
  list.querySelectorAll('.ac-item[data-cid]').forEach(el=>{
    el.addEventListener('mousedown', e=>{ e.preventDefault(); pickClient(el.dataset.cid); });
  });
  list._sel = -1;
  list.classList.add('show');
}
function hideClientAC(){
  const list = document.getElementById('clientAcList');
  if(list){ list.classList.remove('show'); list._sel = -1; }
}
function onClientACKey(e){
  const list = document.getElementById('clientAcList');
  if(!list || !list.classList.contains('show')) return;
  const items = list.querySelectorAll('.ac-item[data-cid]');
  if(!items.length) return;
  if(e.key === 'ArrowDown'){ e.preventDefault(); list._sel = (list._sel+1) % items.length; items.forEach((el,j)=>el.classList.toggle('sel', j===list._sel)); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); list._sel = list._sel<=0?items.length-1:list._sel-1; items.forEach((el,j)=>el.classList.toggle('sel', j===list._sel)); }
  else if(e.key === 'Enter' && list._sel >= 0){ e.preventDefault(); pickClient(items[list._sel].dataset.cid); }
  else if(e.key === 'Escape'){ hideClientAC(); }
}
function pickClient(cid){
  const c = DB.clients.find(x=>x.id===cid);
  if(!c) return;
  editingQuote.client = c.name;
  editingQuote.client_id = c.id;
  document.getElementById('eq_client').value = c.name;
  const link = document.getElementById('eq_client_link');
  if(link) link.innerHTML = `Linked to <b>${escapeHTML(c.name)}</b> · ${c.gstin?'GST '+escapeHTML(c.gstin)+' · ':''}<a href="#" onclick="event.preventDefault();unlinkClient()">Unlink</a>`;

  const dl = document.getElementById('eq_proj_list');
  if(dl) dl.innerHTML = (c.projects||[]).map(p=>`<option value="${escapeHTML(p)}">`).join('');

}
function unlinkClient(){
  delete editingQuote.client_id;
  const link = document.getElementById('eq_client_link');
  if(link) link.innerHTML = 'Unlinked. Type a name above to search or pick another client.';
  const dl = document.getElementById('eq_proj_list');

}

function addLineItem(){
  editingQuote.items.push({desc:'', make:'', code:'', qty:1, price:0, uom:'Nos.', country:''});
  renderLineItems();
  renderTotals();
  // focus the new row's make field
  setTimeout(()=>{
    const inputs = document.querySelectorAll('.li-make-input');
    if(inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function renderLineItems(){
  const body = document.getElementById('liBody');
  if(!body) return;
  const q = editingQuote;
  body.innerHTML = q.items.map((it,i)=>`
    <tr class="li-row" data-idx="${i}">
      <td class="muted" style="text-align:center;padding:11px 4px">${i+1}</td>
      <td>
        <div class="ac-wrap">
          <input class="li-make-input" data-field="make" data-idx="${i}" value="${escapeHTML(it.make)}" placeholder="Search products...">
          <div class="ac-list" data-idx="${i}"></div>
        </div>
      </td>
      <td><input data-field="desc" data-idx="${i}" value="${escapeHTML(it.desc)}" placeholder="Description"></td>
      <td><input data-field="code" data-idx="${i}" value="${escapeHTML(it.code||'')}"></td>
      <td><input data-field="uom" data-idx="${i}" value="${escapeHTML(it.uom||'Nos.')}"></td>
      <td class="num"><input data-field="qty" data-idx="${i}" type="number" step="any" value="${it.qty||0}"></td>
      <td class="num"><input data-field="price" data-idx="${i}" type="number" step="0.01" value="${it.price||0}"></td>
      <td class="li-amt">${fmtINR((it.qty||0)*(it.price||0))}</td>
      <td><button class="btn btn-icon btn-ghost" title="Remove" onclick="removeLineItem(${i})">×</button></td>
    </tr>
  `).join('');

  // wire input events
  body.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', onLineInput);
    inp.addEventListener('blur', onLineBlur);
    if(inp.classList.contains('li-make-input')){
      inp.addEventListener('input', onMakeInput);
      inp.addEventListener('blur', e=>setTimeout(()=>hideAC(+inp.dataset.idx), 200));
      inp.addEventListener('keydown', e=>onACKeydown(e, +inp.dataset.idx));
    }
  });
}

function onLineInput(e){
  const i = +e.target.dataset.idx;
  const f = e.target.dataset.field;
  let v = e.target.value;
  if(f==='qty' || f==='price') v = +v || 0;
  editingQuote.items[i][f] = v;
  // update amount cell
  const row = e.target.closest('tr');
  if(row){
    const amtCell = row.querySelector('.li-amt');
    if(amtCell){
      const it = editingQuote.items[i];
      amtCell.textContent = fmtINR((it.qty||0)*(it.price||0));
    }
  }
  renderTotals();
}
function onLineBlur(e){
  // when price was changed and we have a known product, offer to update catalog
  const i = +e.target.dataset.idx;
  const f = e.target.dataset.field;
  if(f !== 'price') return;
  const it = editingQuote.items[i];
  if(!it.make || !it.price) return;
  // find existing catalog match
  const match = DB.products.find(p=>p.make.toLowerCase()===it.make.toLowerCase() && p.desc.toLowerCase()===(it.desc||'').toLowerCase());
  if(match && match.price !== it.price && match.price > 0){
    if(it._priceAsked) return;
    it._priceAsked = true;
    setTimeout(()=>{
      if(confirm(`Update catalog price for "${match.make}" from ${fmtINR(match.price)} to ${fmtINR(it.price)}?`)){
        match.price = it.price;
        saveDB();
        toast('Catalog price updated');
      }
    }, 100);
  }
}

function removeLineItem(i){
  editingQuote.items.splice(i,1);
  renderLineItems();
  renderTotals();
}

/* Autocomplete for product picker */
function onMakeInput(e){
  const i = +e.target.dataset.idx;
  const txt = e.target.value.trim().toLowerCase();
  editingQuote.items[i].make = e.target.value;
  if(txt.length < 1){ hideAC(i); return; }
  const matches = DB.products.filter(p=>{
    const hay = (p.make + ' ' + p.desc + ' ' + (p.category||'')).toLowerCase();
    return txt.split(/\s+/).every(t=>hay.includes(t));
  }).slice(0, 12);
  showAC(i, matches);
}
function showAC(i, items){
  const list = document.querySelector(`.ac-list[data-idx="${i}"]`);
  if(!list) return;
  if(items.length === 0){ hideAC(i); return; }
  list.innerHTML = items.map((p,j)=>`
    <div class="ac-item" data-pid="${p.id}" data-pi="${j}">
      <div><span class="ac-make">${escapeHTML(p.make)}</span> <span class="ac-meta">${fmtINR(p.price)}</span></div>
      <div class="ac-desc">${escapeHTML(p.desc)} ${p.category?`<span class="tag">${escapeHTML(p.category)}</span>`:''}</div>
    </div>
  `).join('');
  list.querySelectorAll('.ac-item').forEach(el=>{
    el.addEventListener('mousedown', e=>{
      e.preventDefault();
      pickProduct(i, el.dataset.pid);
    });
  });
  list._items = items;
  list._sel = -1;
  list.classList.add('show');
}
function hideAC(i){
  const list = document.querySelector(`.ac-list[data-idx="${i}"]`);
  if(list){ list.classList.remove('show'); list._sel = -1; }
}
function onACKeydown(e, i){
  const list = document.querySelector(`.ac-list[data-idx="${i}"]`);
  if(!list || !list.classList.contains('show')) return;
  const items = list.querySelectorAll('.ac-item');
  if(!items.length) return;
  if(e.key === 'ArrowDown'){ e.preventDefault(); list._sel = (list._sel+1) % items.length; updateACSel(list); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); list._sel = (list._sel<=0?items.length-1:list._sel-1); updateACSel(list); }
  else if(e.key === 'Enter' && list._sel >= 0){ e.preventDefault(); pickProduct(i, items[list._sel].dataset.pid); }
  else if(e.key === 'Escape'){ hideAC(i); }
}
function updateACSel(list){
  list.querySelectorAll('.ac-item').forEach((el,j)=>el.classList.toggle('sel', j===list._sel));
  const sel = list.querySelectorAll('.ac-item')[list._sel];
  if(sel) sel.scrollIntoView({block:'nearest'});
}
function pickProduct(i, pid){
  const p = DB.products.find(x=>x.id===pid);
  if(!p) return;
  editingQuote.items[i] = {
    ...editingQuote.items[i],
    make: p.make,
    desc: p.desc,
    code: p.code || '',
    uom: p.uom || 'Nos.',
    country: p.country || '',
    price: p.price || 0,
    qty: editingQuote.items[i].qty || 1,
  };
  hideAC(i);
  renderLineItems();
  renderTotals();
}

function updateTaxType(){
  const v = document.getElementById('eq_tax_type').value;
  editingQuote.tax_type = v;
  editingQuote.tax_pct = v==='NONE' ? 0 : 18;
  renderTotals();
}

function renderTotals(){
  const q = editingQuote;
  const dEl = document.getElementById('eq_discount');
  if(dEl) q.discount = +dEl.value || 0;
  const afterDisc = quoteAfterDiscount(q);
  const tax = quoteTax(q);
  const total = quoteTotal(q);

  const taxLabel = q.tax_type==='IGST' ? 'IGST 18%' : q.tax_type==='SGST_CGST' ? 'SGST 9% + CGST 9%' : 'No tax';
  const taxBreakdown = q.tax_type==='SGST_CGST'
    ? `<div class="muted" style="font-size:11px;text-align:right;margin-top:-4px;grid-column:1/-1">SGST 9%: ${fmtINR(afterDisc*0.09)} · CGST 9%: ${fmtINR(afterDisc*0.09)}</div>` : '';

  document.getElementById('totalsBox').innerHTML = `
    <div class="totals">
      <div class="lbl muted" style="font-size:11px">${q.items.length} item${q.items.length===1?'':'s'}</div><div class="val"></div>
      ${q.discount ? `<div class="lbl">Discount</div><div class="val">- ${fmtINR(q.discount)}</div>` : ''}
      <div class="lbl">${taxLabel}</div><div class="val">${fmtINR(tax)}</div>
      ${taxBreakdown}
      <div class="lbl grand">Grand Total</div><div class="val grand">${fmtINR(total)}</div>
    </div>
  `;
}

function saveQuote(){
  const q = editingQuote;
  const typedClient = document.getElementById('eq_client').value.trim();
  const projInp = document.getElementById('eq_project');
  q.project_name = projInp ? projInp.value.trim() : '';
  q.date = document.getElementById('eq_date').value || today();
  q.pi_no = document.getElementById('eq_pi').value.trim();
  q.status = document.getElementById('eq_status').value;
  q.tax_type = document.getElementById('eq_tax_type').value;
  q.tax_pct = q.tax_type==='NONE' ? 0 : 18;
  q.discount = +document.getElementById('eq_discount').value || 0;
  q.notes = document.getElementById('eq_notes').value;
  q.updated = new Date().toISOString();

  // Client must be linked to a saved client record
  if(!q.client_id){
    alert('Please pick a client from the suggestions, or click "+ Add new client" to create one. The Client field cannot be free text.');
    return;
  }
  const linked = DB.clients.find(c=>c.id===q.client_id);
  if(!linked){
    alert('Linked client no longer exists. Please pick a client again.');
    return;
  }
  q.client = linked.name; // keep denormalised cache in sync with the linked record
  // Project name is optional — encouraged for clarity but allowed blank (e.g. RENTAL quotes)
  if(q.project_name){
    if(!linked.projects) linked.projects = [];
    if(!linked.projects.some(p=>p.toLowerCase()===q.project_name.toLowerCase())){
      linked.projects.push(q.project_name);
    }
  }
  if(q.items.length===0 && !confirm('Save quote with no line items?')) return;

  // strip private flags
  delete q._isNew;
  q.items.forEach(it=>delete it._priceAsked);

  // upsert
  const idx = DB.quotes.findIndex(x=>x.id===q.id);
  if(idx >= 0) DB.quotes[idx] = q;
  else DB.quotes.push(q);

  saveDB();
  toast('Quote saved');
  navigate('quote', q.id);
}

function saveProduct(id){
  const data = {
    make: document.getElementById('ep_make').value.trim(),
    category: document.getElementById('ep_cat').value.trim(),
    desc: document.getElementById('ep_desc').value.trim(),
    code: document.getElementById('ep_code').value.trim(),
    country: document.getElementById('ep_country').value.trim(),
    uom: document.getElementById('ep_uom').value.trim(),
    price: +document.getElementById('ep_price').value || 0,
  };
  if(!data.make){ alert('Make/Brand required'); return; }
  if(id){
    Object.assign(DB.products.find(p=>p.id===id), data);
  } else {
    let n = 1; while(DB.products.find(p=>p.id===`P${String(n).padStart(4,'0')}`)) n++;
    data.id = `P${String(n).padStart(4,'0')}`;
    DB.products.push(data);
  }
  saveDB();
  closeModal();
  toast('Product saved');
  renderProducts();
}
function deleteProduct(id){
  if(!confirm('Delete this product? Existing quotes are not affected.')) return;
  DB.products = DB.products.filter(p=>p.id!==id);
  saveDB();
  toast('Deleted');
  renderProducts();
}

function saveClient(id){
  ensureClients();
  const data = {
    name: document.getElementById('ec_name').value.trim(),
    contact_person: document.getElementById('ec_cp').value.trim(),
    phone: document.getElementById('ec_ph').value.trim(),
    email: document.getElementById('ec_em').value.trim(),
    address_l1: document.getElementById('ec_a1').value.trim(),
    address_l2: document.getElementById('ec_a2').value.trim(),
    city: document.getElementById('ec_city').value.trim(),
    state: document.getElementById('ec_state').value.trim(),
    pincode: document.getElementById('ec_pin').value.trim(),
    gstin: document.getElementById('ec_gst').value.trim().toUpperCase(),
    pan: document.getElementById('ec_pan').value.trim().toUpperCase(),
    projects: document.getElementById('ec_proj').value.split('\n').map(s=>s.trim()).filter(Boolean),
    notes: document.getElementById('ec_notes').value.trim(),
  };
  if(!data.name){ alert('Client name is required'); return; }
  if(id){
    const c = DB.clients.find(x=>x.id===id);
    Object.assign(c, data);
  } else {
    let n = 1; while(DB.clients.find(c=>c.id===`C${String(n).padStart(4,'0')}`)) n++;
    data.id = `C${String(n).padStart(4,'0')}`;
    data.created = new Date().toISOString();
    DB.clients.push(data);
  }
  saveDB();
  closeModal();
  toast('Client saved');
  if(CURRENT_VIEW==='clients') renderClients();
  else if(CURRENT_VIEW==='client') renderClientDetail(id||data.id);
  else if(CURRENT_VIEW==='new-quote' || CURRENT_VIEW==='edit-quote') {
    // refresh autocomplete
  }
}

function deleteClient(id){
  ensureClients();
  const used = DB.quotes.filter(q => q.client_id===id).length;
  let msg = 'Delete this client?';
  if(used) msg += `\n\nNote: ${used} existing quote${used===1?'':'s'} reference this client. The quotes will keep the client name but lose the link.`;
  if(!confirm(msg)) return;
  DB.clients = DB.clients.filter(c=>c.id!==id);
  DB.quotes.forEach(q=>{ if(q.client_id===id) delete q.client_id; });
  saveDB();
  toast('Deleted');
  navigate('clients');
}

function newQuoteForClient(id){
  ensureClients();
  const c = DB.clients.find(x=>x.id===id);
  if(!c) return;
  CURRENT_VIEW = 'new-quote';
  location.hash = '#new-quote';
  renderNav();
  renderNewQuote();
  // pre-fill client
  setTimeout(()=>{
    const inp = document.getElementById('eq_client');
    if(inp){ inp.value = c.name; pickClient(c.id); }
  }, 50);
}

async function doChangePwd(){
  const o = document.getElementById('s_op').value;
  const n = document.getElementById('s_np').value;
  if(!n || n.length < 4){ alert('New password must be at least 4 characters'); return; }
  const ok = await changePwd(o, n);
  if(ok){ toast('Password changed'); document.getElementById('s_op').value=''; document.getElementById('s_np').value=''; }

}
function exportData(){
  const blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tech-toys-backup-${today()}.json`;
  a.click();
}
function importData(file){
  if(!file) return;
  const r = new FileReader();
  r.onload = e=>{
    try{
      const obj = JSON.parse(e.target.result);
      if(!obj.products || !obj.quotes) throw 'invalid';
      if(!confirm('Replace all current data with this backup?')) return;
      DB = obj;
      saveDB();
      toast('Restored');
      navigate('dashboard');
    }catch(err){ alert('Invalid backup file'); }
  };
  r.readAsText(file);
}

function planClientCleanup(){
  ensureClients();
  const mapByOld = {};
  CLEANUP_MAPPING.forEach(m=>{ mapByOld[m.old.toLowerCase()] = m; });

  const targetClientNames = [...new Set(CLEANUP_MAPPING.filter(m=>m.client).map(m=>m.client))];
  const consolidatedCount = CLEANUP_MAPPING.filter(m=>m.client).length - targetClientNames.length;

  const quotesToDelete = [];
  const quotesToRelink = [];
  const quotesUnmatched = [];

  DB.quotes.forEach(q=>{
    const m = mapByOld[(q.client||'').toLowerCase()];
    if(!m){ quotesUnmatched.push(q); return; }
    if(m.action==='delete'){ quotesToDelete.push(q); return; }
    quotesToRelink.push({q, target: m});
  });

  // Existing auto-created clients that won't be needed any more
  const newClientNamesLc = new Set(targetClientNames.map(s=>s.toLowerCase()));
  const orphanedClients = (DB.clients||[]).filter(c => !newClientNamesLc.has(c.name.toLowerCase()));

  return {
    targetClientNames, consolidatedCount,
    quotesToDelete, quotesToRelink, quotesUnmatched,
    orphanedClients,
    newClientCount: targetClientNames.length,
  };
}

function applyClientCleanup(){
  const plan = planClientCleanup();
  ensureClients();

  // Find or create each consolidated client. Reuse an existing record if its name matches (case-insensitive).
  const clientByName = {};
  const existingByLcName = {};
  DB.clients.forEach(c => { existingByLcName[c.name.toLowerCase()] = c; });
  let nextN = 1;
  function nextClientId(){
    while(DB.clients.find(c=>c.id===`C${String(nextN).padStart(4,'0')}`)) nextN++;
    return `C${String(nextN).padStart(4,'0')}`;
  }

  plan.targetClientNames.forEach(name=>{
    const existing = existingByLcName[name.toLowerCase()];
    if(existing){
      existing.name = name; // normalise capitalisation
      clientByName[name] = existing;
    } else {
      const c = {
        id: nextClientId(),
        name, contact_person:'', phone:'', email:'',
        address_l1:'', address_l2:'', city:'', state:'', pincode:'',
        gstin:'', pan:'', projects:[], notes:'',
        created: new Date().toISOString(),
      };
      DB.clients.push(c);
      clientByName[name] = c;
    }
  });

  // Re-link quotes
  plan.quotesToRelink.forEach(({q,target})=>{
    const c = clientByName[target.client];
    q.client_id = c.id;
    q.client = c.name;
    q.project_name = target.project || '';
    if(target.project){
      if(!c.projects) c.projects = [];
      if(!c.projects.some(p=>p.toLowerCase()===target.project.toLowerCase())) c.projects.push(target.project);
    }
    q.updated = new Date().toISOString();
  });

  // Delete abandoned quotes
  const toDeleteIds = new Set(plan.quotesToDelete.map(q=>q.id));
  DB.quotes = DB.quotes.filter(q=>!toDeleteIds.has(q.id));

  // Drop orphaned clients (any DB.client whose name isn't in our consolidated set)
  const keepNames = new Set(plan.targetClientNames.map(s=>s.toLowerCase()));
  DB.clients = DB.clients.filter(c => keepNames.has(c.name.toLowerCase()));

  saveDB();
  closeModal();
  toast(`Cleanup done · ${plan.newClientCount} clients · ${plan.quotesToRelink.length} quotes re-linked`);
  navigate('clients');
}

const LEAD_SOURCES = ['Referral','Website','Walk-in','Cold Call','Social Media','Other'];
const LEAD_STALE_DAYS = 7;

function ensureLeads(){ if(!Array.isArray(DB.leads)) DB.leads = []; }
function nextLeadId(){
  let n = 1;
  while((DB.leads||[]).find(l=>l.id===`L${String(n).padStart(4,'0')}`)) n++;
  return `L${String(n).padStart(4,'0')}`;
}
function leadDaysIdle(lead){
  const ref = lead.updated || lead.created;
  if(!ref) return 0;
  return Math.floor((Date.now() - new Date(ref).getTime()) / (1000*60*60*24));
}
function leadIsStale(lead){
  return lead.status === 'Open' && leadDaysIdle(lead) >= LEAD_STALE_DAYS;
}
function openLeads(){
  ensureLeads();
  return DB.leads.filter(l => l.status === 'Open');
}

let leadFilter = {q:'', status:'Open'};

function renderLeads(){
  ensureLeads();
  let ls = [...DB.leads];
  if(leadFilter.q){
    const t = leadFilter.q.toLowerCase();
    ls = ls.filter(l => ((l.client_name||'')+' '+(l.project_name||'')+' '+(l.contact_person||'')+' '+(l.notes||'')).toLowerCase().includes(t));
  }
  if(leadFilter.status) ls = ls.filter(l => l.status === leadFilter.status);
  // Sort: stale first, then newest
  ls.sort((a,b)=>{
    if(leadIsStale(a) !== leadIsStale(b)) return leadIsStale(a) ? -1 : 1;
    return (b.updated||b.created||'').localeCompare(a.updated||a.created||'');
  });

  const openCount = openLeads().length;
  const staleCount = openLeads().filter(leadIsStale).length;
  const totalEstimated = ls.reduce((s,l)=>s+(+l.estimated_value||0), 0);

  document.getElementById('mainView').innerHTML = `

      <input id="lSearch" placeholder="Search client, project, contact, notes..." value="${escapeHTML(leadFilter.q)}">
      <select id="lStatus">
        <option value="">All statuses</option>
        ${['Open','Converted','Lost'].map(s=>`<option value="${s}" ${leadFilter.status===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>

    <div class="card" style="padding:0">
      <table class="tbl tbl-clickable">
        <thead><tr><th>Client / Project</th><th>Contact</th><th>Source</th><th class="num">Est. Value</th><th>Next Follow-up</th><th>Idle</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${ls.length===0 ? '<tr><td colspan="8" class="empty">No leads match. Click <b>+ New Lead</b> to add one.</td></tr>' :
            ls.map(l=>{
              const idle = leadDaysIdle(l);
              const stale = leadIsStale(l);
              return `<tr onclick="openLeadModal('${l.id}')" style="${stale?'background:rgba(251,191,36,0.06)':''}">
                <td><b>${escapeHTML(l.client_name||'(no client)')}</b>${l.project_name?`<div class="muted" style="font-size:12px">${escapeHTML(l.project_name)}</div>`:''}</td>
                <td class="muted">${[l.contact_person,l.contact_phone].filter(Boolean).map(escapeHTML).join(' · ')||'—'}</td>
                <td><span class="tag">${escapeHTML(l.source||'—')}</span></td>
                <td class="num">${l.estimated_value ? fmtINR(l.estimated_value) : '<span class="muted">—</span>'}</td>
                <td class="muted">${l.next_followup ? fmtDate(l.next_followup) : '—'}</td>
                <td style="color:${stale?'var(--amber)':'var(--muted)'}"><b>${idle}d</b>${stale?' ⚠':''}</td>
                <td><span class="pill ${l.status==='Open'?'pill-pending':l.status==='Converted'?'pill-won':'pill-lost'}">${l.status}</span></td>
                <td>${l.status==='Open'?`<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();convertLeadToQuote('${l.id}')">→ Convert</button>`:l.converted_quote_id?`<a href="#" onclick="event.preventDefault();event.stopPropagation();navigate('quote','${l.converted_quote_id}')">View quote →</a>`:''}</td>
